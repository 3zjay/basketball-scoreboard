<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NBA Scorebug 2</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@700&family=Barlow+Condensed:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body { background:transparent; overflow:hidden; width:100%; height:100%; }

#scorebug {
  position:fixed;
  bottom:2vw; left:50%; transform:translateX(-50%);
  display:flex; align-items:center;
  height:5.5vw;
  font-family:'Barlow Condensed',sans-serif;
  border-radius:0.5vw;
  overflow:hidden;
  box-shadow:0 0.4vw 2.5vw rgba(0,0,0,0.8);
}

/* ─ HOME LOGO (left bookend, same height as bar) ─ */
.home-logo-seg {
  width:6vw; height:100%;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; overflow:hidden;
  background:#111;
  border-right:0.18vw solid rgba(255,255,255,0.12);
  transition:background 0.4s, box-shadow 0.4s;
}
.home-logo-seg img { width:5.3vw; height:5.3vw; object-fit:contain; }
.logo-ph { font-size:0.5vw; font-weight:700; color:rgba(255,255,255,0.25); text-transform:uppercase; text-align:center; }

/* ─ HOME SCORE BLOCK ─ */
.home-seg {
  height:100%;
  display:flex; align-items:center;
  padding:0 1.3vw;
  background:#1a4fa0;
  flex-shrink:0;
}
.score-col { display:flex; flex-direction:column; align-items:flex-start; }
.score-num {
  font-family:'Teko',sans-serif; font-size:3.6vw; font-weight:700;
  color:#fff; line-height:0.88; font-variant-numeric:tabular-nums;
}
.fouls-lbl {
  font-size:0.62vw; font-weight:800; letter-spacing:0.08vw;
  color:rgba(255,255,255,0.8); text-transform:uppercase; white-space:nowrap;
}
@keyframes scoreBump { 0%{transform:scale(1)} 40%{transform:scale(1.2);color:#ffe066} 100%{transform:scale(1)} }
.bump { animation:scoreBump 0.38s ease; }

/* ─ CENTER DIVIDER LOGO (same height as bar) ─ */
.divider-logo-seg {
  width:6vw; height:100%;
  display:flex; align-items:center; justify-content:center;
  flex-shrink:0; overflow:hidden;
  background:#111;
  border-left:0.18vw solid rgba(255,255,255,0.12);
  border-right:0.18vw solid rgba(255,255,255,0.12);
  transition:background 0.4s, box-shadow 0.4s;
}
.divider-logo-seg img { width:5.3vw; height:5.3vw; object-fit:contain; }

/* ─ AWAY SCORE BLOCK ─ */
.away-seg {
  height:100%;
  display:flex; align-items:center;
  padding:0 1.3vw;
  background:#c8102e;
  flex-shrink:0;
}

/* ─ RIGHT INFO ─ */
.info-seg {
  height:100%;
  display:flex; align-items:center; gap:0.8vw;
  background:#16202e;
  padding:0 1.3vw;
  flex-shrink:0;
}
.period-clock { display:flex; flex-direction:column; align-items:flex-start; }
.period-val {
  font-size:1.45vw; font-weight:900; font-style:italic;
  color:#fff; letter-spacing:0.05vw; line-height:1; text-transform:uppercase;
}
.clock-val {
  font-family:'Teko',sans-serif; font-size:2.3vw; font-weight:700;
  color:#fff; line-height:1; font-variant-numeric:tabular-nums; transition:color 0.3s;
}
.clock-val.warn { color:#ff5f5f; }
.info-divider { width:1px; height:60%; background:rgba(255,255,255,0.15); flex-shrink:0; }
.shot-col { display:flex; flex-direction:column; align-items:center; }
.shot-lbl { font-size:0.45vw; font-weight:800; letter-spacing:0.15vw; color:rgba(255,255,255,0.3); text-transform:uppercase; }
.shot-val {
  font-family:'Teko',sans-serif; font-size:2.9vw; font-weight:700;
  color:#f5c842; line-height:1; font-variant-numeric:tabular-nums;
}
.shot-val.urgent { color:#e84040; animation:scPulse 0.45s ease infinite alternate; }
@keyframes scPulse { to{opacity:0.35} }

/* Possession dot */
.poss-dot {
  position:absolute; width:0.4vw; height:0.4vw; border-radius:50%;
  background:#fff; box-shadow:0 0 0.3vw #fff;
  opacity:0; transition:opacity 0.3s;
}
.poss-dot.on { opacity:1; animation:dp 0.9s ease-in-out infinite alternate; }
@keyframes dp { from{transform:scale(1)} to{transform:scale(1.6)} }
</style>
</head>
<body>
<div id="scorebug">

  <!-- HOME LOGO -->
  <div class="home-logo-seg" id="homeLogoN2">
    <div class="logo-ph">LOGO</div>
  </div>

  <!-- HOME SCORE -->
  <div class="home-seg" id="homeBlock">
    <div class="score-col" style="position:relative;">
      <div class="poss-dot" id="possHome" style="top:0.2vw;left:-0.7vw;"></div>
      <div class="score-num" id="homeScoreN2">0</div>
      <div class="fouls-lbl">FOULS: <span id="homeFoulsN2">0</span></div>
    </div>
  </div>

  <!-- CENTER DIVIDER (away logo) -->
  <div class="divider-logo-seg" id="awayLogoN2">
    <div class="logo-ph">LOGO</div>
  </div>

  <!-- AWAY SCORE -->
  <div class="away-seg" id="awayBlock">
    <div class="score-col" style="position:relative;">
      <div class="poss-dot" id="possAway" style="top:0.2vw;right:-0.7vw;"></div>
      <div class="score-num" id="awayScoreN2">0</div>
      <div class="fouls-lbl">FOULS: <span id="awayFoulsN2">0</span></div>
    </div>
  </div>

  <!-- RIGHT INFO -->
  <div class="info-seg">
    <div class="period-clock">
      <div class="period-val" id="periodN2">1ST</div>
      <div class="clock-val" id="gameClkN2">10:00</div>
    </div>
    <div class="info-divider"></div>
    <div class="shot-col">
      <div class="shot-lbl">SHOT</div>
      <div class="shot-val" id="shotClkN2">24</div>
    </div>
  </div>

</div>
<script>
const DEF={homeScore:0,awayScore:0,homeFouls:0,awayFouls:0,homeAbbr:'HOME',homeColor:'#1a4fa0',homeLogo:null,awayAbbr:'AWAY',awayColor:'#c8102e',awayLogo:null,quarter:1,gameSeconds:600,shotSeconds:24,gameRunning:false,shotRunning:false,possession:null};
const PERIODS=['1ST','2ND','3RD','4TH','OT','2OT'];
let S={...DEF},lastHome=-1,lastAway=-1;

let localTick=null;
function startLocalTick(){if(localTick)return;localTick=setInterval(()=>{if(S.gameRunning&&S.gameSeconds>0){S.gameSeconds--;renderClocks();}if(S.shotRunning&&S.shotSeconds>0){S.shotSeconds--;renderClocks();}},1000);}
function stopLocalTick(){clearInterval(localTick);localTick=null;}
function syncLocalTick(){if(S.gameRunning||S.shotRunning)startLocalTick();else stopLocalTick();}

function renderClocks(){
  const m=Math.floor(S.gameSeconds/60),sec=S.gameSeconds%60;
  const c=document.getElementById('gameClkN2');
  if(c){c.textContent=`${m}:${sec.toString().padStart(2,'0')}`;c.className='clock-val'+(S.gameSeconds<=30?' warn':'');}
  const sh=document.getElementById('shotClkN2');
  if(sh){sh.textContent=S.shotSeconds;sh.className='shot-val'+(S.shotSeconds<=5?' urgent':'');}
}

function s(id,v){const e=document.getElementById(id);if(e)e.textContent=v;}

function darken(hex,amt=50){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
}

function render(){
  const qL=typeof S.quarter==='number'?(PERIODS[S.quarter-1]||`Q${S.quarter}`):S.quarter;
  s('periodN2',qL);

  const hEl=document.getElementById('homeScoreN2');
  const aEl=document.getElementById('awayScoreN2');
  if(hEl&&parseInt(hEl.textContent)!==S.homeScore){hEl.textContent=S.homeScore;if(lastHome>=0){hEl.classList.remove('bump');void hEl.offsetWidth;hEl.classList.add('bump');}}
  if(aEl&&parseInt(aEl.textContent)!==S.awayScore){aEl.textContent=S.awayScore;if(lastAway>=0){aEl.classList.remove('bump');void aEl.offsetWidth;aEl.classList.add('bump');}}
  lastHome=S.homeScore;lastAway=S.awayScore;

  s('homeFoulsN2',S.homeFouls||0);
  s('awayFoulsN2',S.awayFouls||0);
  renderClocks();

  const hc=S.homeColor||'#1a4fa0';
  const ac=S.awayColor||'#c8102e';

  // Home block color
  const hb=document.getElementById('homeBlock');
  if(hb)hb.style.background=hc;

  // Away block color
  const ab=document.getElementById('awayBlock');
  if(ab)ab.style.background=ac;

  // Home logo seg — dark bg with home color glow
  const hL=document.getElementById('homeLogoN2');
  if(hL){
    hL.innerHTML=S.homeLogo?`<img src="${S.homeLogo}" alt="">`:'<div class="logo-ph">LOGO</div>';
    hL.style.background=darken(hc,60);
    hL.style.boxShadow=`inset 0 0 1.5vw ${hc}66`;
    hL.style.borderRight=`0.18vw solid ${hc}88`;
  }

  // Away logo seg (center divider) — dark bg with away color glow
  const aL=document.getElementById('awayLogoN2');
  if(aL){
    aL.innerHTML=S.awayLogo?`<img src="${S.awayLogo}" alt="">`:'<div class="logo-ph">LOGO</div>';
    aL.style.background=darken(ac,60);
    aL.style.boxShadow=`inset 0 0 1.5vw ${ac}66`;
    aL.style.borderLeft=`0.18vw solid ${ac}88`;
    aL.style.borderRight=`0.18vw solid ${ac}88`;
  }

  document.getElementById('possHome')?.classList.toggle('on',S.possession==='home');
  document.getElementById('possAway')?.classList.toggle('on',S.possession==='away');
}

window.addEventListener('load',()=>{const a=new Audio('/buzzer.mp3');a.volume=0;a.play().then(()=>{a.pause();a.currentTime=0;}).catch(()=>{});});
function playGameBuzzer(){const a=new Audio('/buzzer.mp3');a.volume=1;a.play().catch(()=>{});}
function playShotBuzzer(){const a=new Audio('/buzzer.mp3');a.volume=1;a.play().catch(()=>{});}
function connectSSE(){
  const es=new EventSource('/events');
  es.onmessage=e=>{try{const msg=JSON.parse(e.data);if(msg.type==='buzz'){if(msg.kind==='game')playGameBuzzer();else playShotBuzzer();}else if(msg.type==='state'){stopLocalTick();S={...DEF,...msg.data};render();syncLocalTick();}}catch(err){}};
  es.onerror=()=>{es.close();setTimeout(connectSSE,2000);};
}
fetch('/state').then(r=>r.json()).then(d=>{if(Object.keys(d).length){S={...DEF,...d};render();syncLocalTick();}}).catch(()=>{}).finally(()=>connectSSE());
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scoreboard Display</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%; overflow:hidden;
  background:#050505; user-select:none;
}

/* ═══ FULL-SCREEN 3-ROW GRID ═══ */
.scoreboard {
  width:100vw; height:100vh;
  display:grid;
  grid-template-rows: 22vh 58vh 20vh;
}

/* ══ ROW 1: CLOCK + TEAM NAMES ══ */
.row-clock {
  display:grid;
  grid-template-columns: 1fr auto 1fr;
  background:#080808;
  border-bottom:2px solid #1c1c1c;
  overflow:hidden;
}
.team-header {
  display:flex; align-items:center; justify-content:center;
  padding:0 2vw;
  font-family:'Teko',sans-serif; font-size:5.5vw; font-weight:700;
  letter-spacing:0.3vw; text-transform:uppercase; color:#fff;
  text-shadow:0 0 20px rgba(255,255,255,0.15);
}
.clock-wrap {
  display:flex; align-items:center; justify-content:center;
  padding:0 1vw;
}
.clock-digit {
  font-family:'Teko',sans-serif; font-size:20vh; font-weight:700;
  color:#ffaa00; line-height:1; text-align:center; min-width:6.5vw;
  text-shadow:0 0 40px rgba(255,170,0,0.5),0 0 80px rgba(255,130,0,0.15);
}
.clock-colon {
  font-family:'Teko',sans-serif; font-size:18vh; font-weight:700;
  color:#ffaa00; line-height:1; padding:0 0.3vw;
  text-shadow:0 0 40px rgba(255,170,0,0.5);
  animation:colonBlink 1s step-end infinite;
}
@keyframes colonBlink { 0%,100%{opacity:1} 50%{opacity:0.1} }

/* ══ ROW 2: SCORES + CENTER ══ */
.row-scores {
  display:grid;
  grid-template-columns: 1fr 18vw 1fr;
  background:#0a0a0a;
  border-bottom:2px solid #1c1c1c;
}
.team-block {
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:1vh 1vw; position:relative; overflow:hidden;
}
.team-block.home::after {
  content:''; position:absolute; top:10%; right:0; bottom:10%;
  width:4px; border-radius:2px; background:var(--team-color,#f5c842);
  box-shadow:0 0 14px var(--team-color,#f5c842);
}
.team-block.away::before {
  content:''; position:absolute; top:10%; left:0; bottom:10%;
  width:4px; border-radius:2px; background:var(--team-color,#c8102e);
  box-shadow:0 0 14px var(--team-color,#c8102e);
}
.score-val {
  font-family:'Teko',sans-serif;
  font-size:clamp(8rem,46vh,40vw);
  font-weight:700; line-height:0.88;
  text-align:center; color:#ff2200;
  text-shadow:0 0 40px rgba(255,34,0,0.35);
}
@keyframes scoreBump {
  0%{transform:scale(1)}
  35%{transform:scale(1.1);color:#ff6600;text-shadow:0 0 50px rgba(255,100,0,0.9)}
  100%{transform:scale(1)}
}
.bump { animation:scoreBump 0.45s ease; }

/* Center column */
.center-col {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:1vh 0;
  border-left:1px solid #1c1c1c;
  border-right:1px solid #1c1c1c;
}
.lbl {
  font-family:'Teko',sans-serif; font-size:1.6vh; font-weight:700;
  color:#383838; letter-spacing:0.4vw; text-transform:uppercase; line-height:1;
}
.period-num {
  font-family:'Teko',sans-serif; font-size:22vh; font-weight:700;
  color:#00ee44; line-height:0.85; text-align:center;
  text-shadow:0 0 24px rgba(0,238,68,0.5);
}
.divider { width:60%; height:1px; background:#1c1c1c; margin:0.5vh 0; }
.shot-num {
  font-family:'Teko',sans-serif; font-size:18vh; font-weight:700;
  color:#ffaa00; line-height:0.85; text-align:center;
  text-shadow:0 0 24px rgba(255,170,0,0.5); transition:color 0.2s;
}
.shot-num.urgent {
  color:#ff2200;
  text-shadow:0 0 28px rgba(255,30,0,0.8);
  animation:urgentPulse 0.35s ease infinite alternate;
}
@keyframes urgentPulse { to{opacity:0.35} }

/* ══ ROW 3: FOULS + POSSESSION ══ */
.row-bottom {
  display:grid;
  grid-template-columns: 1fr auto 1fr;
  background:#080808;
}
.fouls-block {
  display:flex; align-items:center; justify-content:center;
  gap:1.5vw; padding:0 3vw;
}
.fouls-lbl {
  font-family:'Teko',sans-serif; font-size:2.8vh; font-weight:700;
  color:#444; letter-spacing:0.4vw; text-transform:uppercase;
}
.fouls-val {
  font-family:'Teko',sans-serif; font-size:10vh; font-weight:700;
  color:#ff9900; line-height:1;
  text-shadow:0 0 16px rgba(255,153,0,0.5);
}

/* Possession */
.poss-wrap {
  display:flex; align-items:center; justify-content:center;
  gap:2vw; padding:0 2vw;
}
.poss-item {
  display:flex; align-items:center; gap:0.8vw;
  opacity:0.12; transition:opacity 0.3s;
}
.poss-item.on { opacity:1; }
.poss-logo {
  width:10vh; height:10vh; border-radius:50%;
  background:#111; border:3px solid #222;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; flex-shrink:0;
  transition:border-color 0.3s, box-shadow 0.3s;
}
.poss-logo img { width:88%; height:88%; object-fit:contain; }
.poss-logo-ph {
  font-family:'Teko',sans-serif; font-size:1.8vh; font-weight:700;
  color:#555; text-align:center; text-transform:uppercase; letter-spacing:1px;
}
.poss-item.on .poss-logo {
  box-shadow:0 0 16px rgba(255,136,0,0.9), 0 0 32px rgba(255,100,0,0.4);
}
.poss-arrow { display:flex; align-items:center; }
.poss-item.on .poss-arrow {
  filter:drop-shadow(0 0 6px #ff8800) drop-shadow(0 0 14px #ff6600);
}
.poss-item.home.on .poss-arrow { animation:arrowRight 0.9s ease-in-out infinite alternate; }
.poss-item.away.on .poss-arrow { animation:arrowLeft  0.9s ease-in-out infinite alternate; }
@keyframes arrowRight { from{transform:translateX(0)} to{transform:translateX(6px)} }
@keyframes arrowLeft  { from{transform:translateX(0)} to{transform:translateX(-6px)} }

/* Score flash */
.score-flash {
  position:fixed; inset:0; z-index:100; pointer-events:none; opacity:0;
  background:radial-gradient(ellipse 60% 40% at 50% 55%,rgba(255,40,0,0.12),transparent 70%);
}
@keyframes flash { 0%{opacity:0} 15%{opacity:1} 100%{opacity:0} }
.flash-anim { animation:flash 0.7s ease forwards; }

/* Sound unlock */
#soundUnlock {
  position:fixed; inset:0; z-index:99999;
  background:rgba(0,0,0,0.9);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:24px; cursor:pointer;
}
#soundUnlock h2 { font-family:'Teko',sans-serif; font-size:6vh; color:#fff; letter-spacing:4px; text-transform:uppercase; }
#soundUnlock button {
  font-family:'Teko',sans-serif; font-size:4vh; font-weight:700;
  letter-spacing:3px; text-transform:uppercase;
  background:#c8102e; color:#fff; border:none;
  padding:22px 60px; border-radius:12px; cursor:pointer;
}

#fsBtn {
  position:fixed; bottom:16px; right:16px; z-index:9998;
  width:48px; height:48px; border-radius:50%;
  background:rgba(0,0,0,0.7); border:1px solid rgba(255,255,255,0.15);
  color:#fff; font-size:20px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  opacity:0.4; transition:opacity 0.2s;
}
#fsBtn:hover { opacity:1; }
</style>
</head>
<body>

<div id="soundUnlock" onclick="unlockAudio()">
  <h2>🏀 Scoreboard Display</h2>
  <button>TAP TO ACTIVATE SOUND</button>
</div>
<button id="fsBtn" onclick="toggleFullscreen()">⛶</button>
<div class="score-flash" id="scoreFlash"></div>

<div class="scoreboard">

  <!-- ROW 1: CLOCK -->
  <div class="row-clock">
    <div class="team-header" id="homeNameEl">HOME</div>
    <div class="clock-wrap">
      <div class="clock-digit" id="clkM1">1</div>
      <div class="clock-digit" id="clkM2">0</div>
      <div class="clock-colon">:</div>
      <div class="clock-digit" id="clkS1">0</div>
      <div class="clock-digit" id="clkS2">0</div>
    </div>
    <div class="team-header" id="guestNameEl">AWAY</div>
  </div>

  <!-- ROW 2: SCORES -->
  <div class="row-scores">
    <div class="team-block home" id="homeBlock">
      <div class="score-val" id="homeScoreEl">0</div>
    </div>
    <div class="center-col">
      <div class="lbl">PERIOD</div>
      <div class="period-num" id="periodEl">1</div>
      <div class="divider"></div>
      <div class="lbl">SHOT</div>
      <div class="shot-num" id="shotEl">24</div>
    </div>
    <div class="team-block away" id="awayBlock">
      <div class="score-val" id="awayScoreEl">0</div>
    </div>
  </div>

  <!-- ROW 3: FOULS + POSSESSION -->
  <div class="row-bottom">
    <div class="fouls-block">
      <div class="fouls-lbl">FOULS</div>
      <div class="fouls-val" id="homeFoulsEl">0</div>
    </div>

    <div class="poss-wrap">
      <div class="poss-item home" id="possHome">
        <div class="poss-logo" id="possLogoHome"><div class="poss-logo-ph">HME</div></div>
        <div class="poss-arrow">
          <svg viewBox="0 0 60 42" style="width:5vw;height:3.5vw;">
            <defs><radialGradient id="agHome" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="40%" stop-color="#ffcc00"/>
              <stop offset="100%" stop-color="#ff6600"/>
            </radialGradient></defs>
            <polygon points="4,21 56,3 56,39" fill="url(#agHome)"/>
          </svg>
        </div>
      </div>
      <div class="poss-item away" id="possAway">
        <div class="poss-arrow">
          <svg viewBox="0 0 60 42" style="width:5vw;height:3.5vw;">
            <defs><radialGradient id="agAway" cx="50%" cy="50%" r="50%">
              <stop offset="0%" stop-color="#ffffff"/>
              <stop offset="40%" stop-color="#ffcc00"/>
              <stop offset="100%" stop-color="#ff6600"/>
            </radialGradient></defs>
            <polygon points="56,21 4,3 4,39" fill="url(#agAway)"/>
          </svg>
        </div>
        <div class="poss-logo" id="possLogoAway"><div class="poss-logo-ph">AWY</div></div>
      </div>
    </div>

    <div class="fouls-block">
      <div class="fouls-val" id="awayFoulsEl">0</div>
      <div class="fouls-lbl">FOULS</div>
    </div>
  </div>

</div>

<script>
const DEF = {
  homeScore:0, awayScore:0,
  homeFouls:0, awayFouls:0,
  homeAbbr:'HOME', awayAbbr:'AWAY',
  homeColor:'#f5c842', awayColor:'#c8102e',
  homeLogo:null, awayLogo:null,
  quarter:1, gameSeconds:600, shotSeconds:24,
  gameRunning:false, shotRunning:false,
  possession:null,
};

let S = {...DEF};
let lastHome = -1, lastAway = -1;

let localTick = null;
function startLocalTick(){
  if(localTick) return;
  localTick = setInterval(()=>{
    if(S.gameRunning && S.gameSeconds > 0){ S.gameSeconds--; renderClocks(); }
    if(S.shotRunning && S.shotSeconds > 0){ S.shotSeconds--; renderClocks(); }
  }, 1000);
}
function stopLocalTick(){ clearInterval(localTick); localTick = null; }
function syncLocalTick(){ if(S.gameRunning || S.shotRunning){ startLocalTick(); } else { stopLocalTick(); } }

function renderClocks(){
  const m = Math.floor(S.gameSeconds/60), sec = S.gameSeconds%60;
  const mS = m.toString().padStart(2,'0'), sS = sec.toString().padStart(2,'0');
  document.getElementById('clkM1').textContent = mS[0];
  document.getElementById('clkM2').textContent = mS[1];
  document.getElementById('clkS1').textContent = sS[0];
  document.getElementById('clkS2').textContent = sS[1];
  const warn = S.gameSeconds <= 30;
  ['clkM1','clkM2','clkS1','clkS2'].forEach(id => {
    const el = document.getElementById(id);
    if(el){ el.style.color = warn?'#ff3300':'#ffaa00'; el.style.textShadow = warn?'0 0 30px rgba(255,50,0,0.7)':'0 0 40px rgba(255,170,0,0.5)'; }
  });
  const shotEl = document.getElementById('shotEl');
  if(shotEl){ shotEl.textContent = S.shotSeconds; shotEl.className = 'shot-num'+(S.shotSeconds<=5?' urgent':''); }
}

function render(){
  renderClocks();

  const hEl = document.getElementById('homeScoreEl');
  const aEl = document.getElementById('awayScoreEl');
  if(hEl && parseInt(hEl.textContent)!==S.homeScore){ hEl.textContent=S.homeScore; if(lastHome>=0) bump('homeScoreEl'); }
  if(aEl && parseInt(aEl.textContent)!==S.awayScore){ aEl.textContent=S.awayScore; if(lastAway>=0) bump('awayScoreEl'); }
  if((S.homeScore!==lastHome||S.awayScore!==lastAway)&&lastHome>=0) flashScreen();
  lastHome=S.homeScore; lastAway=S.awayScore;

  const hf = document.getElementById('homeFoulsEl');
  const af = document.getElementById('awayFoulsEl');
  if(hf) hf.textContent = S.homeFouls || 0;
  if(af) af.textContent = S.awayFouls || 0;

  const pEl = document.getElementById('periodEl');
  if(pEl) pEl.textContent = S.quarter;

  const hn = document.getElementById('homeNameEl');
  const gn = document.getElementById('guestNameEl');
  if(hn) hn.textContent = (S.homeAbbr||'HOME').toUpperCase();
  if(gn) gn.textContent = (S.awayAbbr||'AWAY').toUpperCase();

  const hb = document.getElementById('homeBlock');
  const ab = document.getElementById('awayBlock');
  if(hb) hb.style.setProperty('--team-color', S.homeColor||'#f5c842');
  if(ab) ab.style.setProperty('--team-color', S.awayColor||'#c8102e');

  const homeOn = S.possession==='home';
  const awayOn = S.possession==='away';
  document.getElementById('possHome')?.classList.toggle('on', homeOn);
  document.getElementById('possAway')?.classList.toggle('on', awayOn);

  const hlEl = document.getElementById('possLogoHome');
  const alEl = document.getElementById('possLogoAway');
  if(hlEl){
    hlEl.innerHTML = S.homeLogo
      ? `<img src="${S.homeLogo}" alt="">`
      : `<div class="poss-logo-ph">${(S.homeAbbr||'HOME').substring(0,3).toUpperCase()}</div>`;
    hlEl.style.borderColor = S.homeColor||'#f5c842';
    hlEl.style.boxShadow = homeOn ? `0 0 14px ${S.homeColor||'#f5c842'}, 0 0 28px ${S.homeColor||'#f5c842'}88` : '';
  }
  if(alEl){
    alEl.innerHTML = S.awayLogo
      ? `<img src="${S.awayLogo}" alt="">`
      : `<div class="poss-logo-ph">${(S.awayAbbr||'AWAY').substring(0,3).toUpperCase()}</div>`;
    alEl.style.borderColor = S.awayColor||'#c8102e';
    alEl.style.boxShadow = awayOn ? `0 0 14px ${S.awayColor||'#c8102e'}, 0 0 28px ${S.awayColor||'#c8102e'}88` : '';
  }
}

function bump(id){ const e=document.getElementById(id); if(!e)return; e.classList.remove('bump'); void e.offsetWidth; e.classList.add('bump'); }
function flashScreen(){ const fl=document.getElementById('scoreFlash'); if(!fl)return; fl.classList.remove('flash-anim'); void fl.offsetWidth; fl.classList.add('flash-anim'); }

const AudioCtx = window.AudioContext||window.webkitAudioContext;
let audioCtx=null;
function getAudioCtx(){ if(!audioCtx) audioCtx=new AudioCtx(); if(audioCtx.state==='suspended') audioCtx.resume(); return audioCtx; }
document.addEventListener('click',()=>getAudioCtx(),{passive:true});
document.addEventListener('touchstart',()=>getAudioCtx(),{passive:true});

function unlockAudio(){
  getAudioCtx();
  const audio=new Audio('/buzzer.mp3'); audio.volume=0;
  audio.play().then(()=>{ audio.pause(); audio.currentTime=0; }).catch(()=>{});
  document.getElementById('soundUnlock').style.display='none';
}

function toggleFullscreen(){
  const btn=document.getElementById('fsBtn');
  if(!document.fullscreenElement){ document.documentElement.requestFullscreen().catch(()=>{}); if(btn) btn.textContent='✕'; }
  else { document.exitFullscreen(); if(btn) btn.textContent='⛶'; }
}
document.addEventListener('fullscreenchange',()=>{ const btn=document.getElementById('fsBtn'); if(btn) btn.textContent=document.fullscreenElement?'✕':'⛶'; });

function playGameBuzzer(){ const a=new Audio('/buzzer.mp3'); a.volume=1.0; a.play().catch(()=>{}); }
function playShotBuzzer(){ const a=new Audio('/buzzer.mp3'); a.volume=1.0; a.play().catch(()=>{}); }

function connectSSE(){
  const es=new EventSource('/events');
  es.onmessage=(e)=>{
    try {
      const msg=JSON.parse(e.data);
      if(msg.type==='buzz'){ if(msg.kind==='game') playGameBuzzer(); else playShotBuzzer(); }
      else if(msg.type==='state'){ stopLocalTick(); S={...DEF,...msg.data}; render(); syncLocalTick(); }
    } catch(err){}
  };
  es.onerror=()=>{ es.close(); setTimeout(connectSSE,2000); };
}

fetch('/state').then(r=>r.json()).then(data=>{
  if(Object.keys(data).length){ S={...DEF,...data}; render(); syncLocalTick(); }
}).catch(()=>{}).finally(()=>{ connectSSE(); });
</script>
</body>
</html>

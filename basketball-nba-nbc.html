<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NBA – NBC Style Scorebug</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="/firebase-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Teko:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;width:100%;height:100%}

/* ══════════════════════════════════════════════
   ROOT
   ══════════════════════════════════════════════ */
#bug{
  position:fixed;
  bottom:2vw; left:50%;
  transform:translateX(-50%);
  display:inline-flex;
  flex-direction:column;
  border-radius:.22vw;
  overflow:hidden;
  box-shadow:0 .4vw 2.5vw rgba(0,0,0,.9);
}

/* ══════════════════════════════════════════════
   MAIN ROW — 5vw tall (matches NBC proportions)

   LEFT  → RIGHT:
   [hTab][hLogoCell][hBrace][hScore][ctr][aScore][aBrace][aLogoCell][aTab]

   Home body  = dark charcoal (constant)
   Home tab   = homeColor (e.g. SAS silver, uses black text)
   Away body  = awayColor (full bright)
   Away tab   = awayColor darkened
   ══════════════════════════════════════════════ */
#row{
  display:flex;
  align-items:stretch;
  height:5vw;
}

/* ── ABBR TABS ── */
.tab{
  width:3vw;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  background:#888; /* JS sets homeColor / awayColor */
}
.tab-txt{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.15vw;font-weight:900;
  text-transform:uppercase;letter-spacing:.1vw;
  writing-mode:vertical-lr;   /* top → bottom, NO rotation */
  text-orientation:mixed;
  line-height:1;
  color:#fff; /* JS may override to #111 for light tabs */
}

/* ── LOGO CELLS ── */
.logo-cell{
  width:5vw;          /* square = row height */
  flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  background:#2d2d2d; /* JS: home=dark constant, away=team color */
}
.circle{
  width:4.15vw;height:4.15vw;
  border-radius:50%;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:#0d0d0d;flex-shrink:0;
}
.circle img{width:100%;height:100%;object-fit:contain}
.no-logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.32vw;font-weight:700;
  color:rgba(255,255,255,.2);text-transform:uppercase;
}

/* ── BRACE + FOUL NUMBER ──
   Narrow column between logo and score.
   Home side: shows [foul] above [}]
   Away side: shows [{]  above [foul]
   ─────────────────────────────────── */
.brace-col{
  width:1.5vw;flex-shrink:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#2d2d2d; /* JS: home=dark, away=team color */
  padding-top:.1vw;
}
.foul-lbl{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.7vw;font-weight:900;color:#fff;
  line-height:1;min-height:.7vw;
  text-align:center;
}
.brace-char{
  font-family:'Barlow Condensed',sans-serif;
  font-size:3.4vw;font-weight:300;
  color:rgba(255,255,255,.55);
  line-height:.78;
}

/* ── SCORE BLOCKS ── */
.score-seg{
  width:5.8vw;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  background:#2d2d2d; /* JS: home=dark, away=team color */
}
.score-num{
  font-family:'Teko',sans-serif;
  font-size:3.8vw;font-weight:700;color:#fff;
  line-height:1;font-variant-numeric:tabular-nums;
}
@keyframes bump{
  0%{transform:scale(1);color:#fff}
  40%{transform:scale(1.22);color:#ffe066}
  100%{transform:scale(1);color:#fff}
}
.bump{animation:bump .38s ease}

/* ── CENTER BLOCK ── */
#ctr{
  width:7.4vw;flex-shrink:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#141414;
  border-left:1px solid rgba(255,255,255,.08);
  border-right:1px solid rgba(255,255,255,.08);
  padding:.25vw 0;gap:.05vw;
}
#hcLogo{
  width:1.75vw;height:1.75vw;
  object-fit:contain;margin-bottom:.06vw;
}
#clk{
  font-family:'Teko',sans-serif;
  font-size:2.45vw;font-weight:700;color:#fff;
  line-height:.9;font-variant-numeric:tabular-nums;
  transition:color .3s;
}
#clk.warn{color:#ff4040}
#prow{
  display:flex;align-items:baseline;gap:.4vw;
  margin-top:.06vw;
}
#per{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.8vw;font-weight:900;color:#fff;
  letter-spacing:.06vw;text-transform:uppercase;
}
#qf{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.8vw;font-weight:900;color:#e82020;
}

/* ══════════════════════════════════════════════
   BOTTOM STRIP
   — No BONUS labels —
   — Shows: rp1Title [lines] rp2Title – rp2Value [lines] rp1Value —
   ══════════════════════════════════════════════ */
#strip{
  display:flex;align-items:center;
  height:1.25vw;
  background:#0c0c0c;
  border-top:1px solid rgba(255,255,255,.05);
}
.s-side{
  display:flex;align-items:center;gap:.5vw;
  padding:0 .85vw;flex-shrink:0;white-space:nowrap;
}
.s-line{
  flex:1;height:1px;
  background:rgba(255,255,255,.18);min-width:.6vw;max-width:2vw;
}
.s-txt{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.5vw;font-weight:800;letter-spacing:.18vw;
  color:rgba(255,255,255,.5);text-transform:uppercase;
  white-space:nowrap;
}
#s-center{
  flex:1;display:flex;align-items:center;justify-content:center;
  gap:.35vw;overflow:hidden;padding:0 .4vw;
}
.ball{
  width:.52vw;height:.52vw;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 35% 35%,#f85c0a,#a03800);
}
#s-txt{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.52vw;font-weight:800;letter-spacing:.2vw;
  color:rgba(255,255,255,.5);text-transform:uppercase;
  white-space:nowrap;font-style:italic;
}
</style>
</head>
<body>
<div id="bug">

  <!-- ══ MAIN ROW ══ -->
  <div id="row">

    <!-- HOME TAB  (homeColor bg, dark text if light color) -->
    <div class="tab" id="hTab"><span class="tab-txt" id="hAbbr">HOME</span></div>

    <!-- HOME LOGO (dark charcoal constant) -->
    <div class="logo-cell" id="hLogoCell">
      <div class="circle" id="hCircle"><div class="no-logo">LOGO</div></div>
    </div>

    <!-- HOME BRACE + FOULS (dark charcoal, home brace opens →) -->
    <div class="brace-col" id="hBraceCol">
      <span class="foul-lbl" id="hFouls"></span>
      <span class="brace-char">}</span>
    </div>

    <!-- HOME SCORE (dark charcoal) -->
    <div class="score-seg" id="hScoreSeg">
      <span class="score-num" id="hNum">0</span>
    </div>

    <!-- CENTER -->
    <div id="ctr">
      <img id="hcLogo" src="/hoop-culture-logo.png" alt="HC">
      <div id="clk">10:00</div>
      <div id="prow">
        <span id="per">1ST</span>
        <span id="qf"></span>
      </div>
    </div>

    <!-- AWAY SCORE (bright team color) -->
    <div class="score-seg" id="aScoreSeg">
      <span class="score-num" id="aNum">0</span>
    </div>

    <!-- AWAY BRACE + FOULS (team color, away brace opens ←) -->
    <div class="brace-col" id="aBraceCol">
      <span class="foul-lbl" id="aFouls"></span>
      <span class="brace-char">{</span>
    </div>

    <!-- AWAY LOGO (team color slightly darkened) -->
    <div class="logo-cell" id="aLogoCell">
      <div class="circle" id="aCircle"><div class="no-logo">LOGO</div></div>
    </div>

    <!-- AWAY TAB (team color darkened) -->
    <div class="tab" id="aTab"><span class="tab-txt" id="aAbbr">AWAY</span></div>

  </div><!-- /row -->

  <!-- ══ BOTTOM STRIP ══ -->
  <div id="strip">
    <!-- Left custom word (rp1Title) -->
    <div class="s-side">
      <span class="s-txt" id="sLeft"></span>
      <div class="s-line"></div>
    </div>
    <!-- Center ticker (rp2Title – rp2Value, fallback empty) -->
    <div id="s-center">
      <div class="ball" id="sBall" style="display:none"></div>
      <span id="s-txt"></span>
    </div>
    <!-- Right custom word (rp1Value) -->
    <div class="s-side">
      <div class="s-line"></div>
      <span class="s-txt" id="sRight"></span>
    </div>
  </div>

</div><!-- /bug -->

<script>
/* ══ FIREBASE / SSE ══ */
const SRV=(window.location.hostname.includes('vercel.app')||window.location.hostname.includes('vercel.sh'))?'https://basketball-scoreboard-o0c7.onrender.com':'';
const useFB=window.location.hostname.includes('vercel.app')||window.location.hostname.includes('vercel.sh');
let db=null;
if(useFB&&typeof firebase!=='undefined'&&isFirebaseConfigured){try{if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);db=firebase.database();}catch(e){}}
const UP=new URLSearchParams(window.location.search);
const CU=UP.get('user')||localStorage.getItem('hc_session_user')||'default';
const FU=CU.replace(/[\.#$\[\]]/g,'_');
let _ll=0,_lb=0;
const bc=new BroadcastChannel('hc_scoreboard_sync');
bc.onmessage=e=>{const m=e.data;if(!m||m.user!==FU)return;_ll=Date.now();if(m.type==='state'){stop();S={...S,...m.data};draw();sync();}else if(m.type==='buzz'&&m.timestamp>_lb){_lb=m.timestamp;m.kind==='game'?gbuzz():sbuzz();}};

/* ══ STATE ══ */
const DEF={
  homeScore:0,awayScore:0,homeFouls:0,awayFouls:0,
  homeBonus:false,awayBonus:false,
  homeAbbr:'HOME',homeColor:'#888888',homeLogo:null,
  awayAbbr:'AWAY',awayColor:'#c8102e',awayLogo:null,
  quarter:1,gameSeconds:600,shotSeconds:24,
  gameRunning:false,shotRunning:false,
  possession:null,
  rp1Title:'',rp1Value:'',rp2Title:'',rp2Value:'',
};
const PER=['1ST','2ND','3RD','4TH','OT','2OT'];
let S={...DEF},lH=-1,lA=-1;

/* ══ TICK ══ */
let tick=null;
function start(){if(tick)return;tick=setInterval(()=>{if(S.gameRunning&&S.gameSeconds>0){S.gameSeconds--;ticks();}if(S.shotRunning&&S.shotSeconds>0){S.shotSeconds--;ticks();}},1000);}
function stop(){clearInterval(tick);tick=null;}
function sync(){(S.gameRunning||S.shotRunning)?start():stop();}

/* ══ HELPERS ══ */
const $=id=>document.getElementById(id);
function tx(id,v){const e=$(id);if(e)e.textContent=v;}
function validHex(h){return h&&typeof h==='string'&&/^#[0-9a-fA-F]{6}/.test(h);}
function dk(h,p){
  if(!validHex(h))return '#1a1a1a';
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return`rgb(${Math.round(r*p)},${Math.round(g*p)},${Math.round(b*p)})`;
}
/* Luminance check — returns true if color is "light" (needs dark text) */
function isLight(h){
  if(!validHex(h))return false;
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return(r*.299+g*.587+b*.114)>160;
}
function logo(cid,url){const c=$(cid);if(!c)return;c.innerHTML=url?`<img src="${url}" alt="" style="width:100%;height:100%;object-fit:contain">`:'<div class="no-logo">LOGO</div>';}

/* ══ CLOCK ══ */
function ticks(){
  const s=S.gameSeconds,m=Math.floor(s/60),sec=s%60;
  const v=s<60?`${s}.0`:`${m}:${sec.toString().padStart(2,'0')}`;
  const e=$('clk');if(e){e.textContent=v;e.className=s<=30?'warn':'';}
}

/* ══ DRAW ══ */
function draw(){
  /* period */
  tx('per',typeof S.quarter==='number'?(PER[S.quarter-1]||`Q${S.quarter}`):S.quarter);
  ticks();

  /* scores + bump */
  const hE=$('hNum'),aE=$('aNum');
  if(hE&&parseInt(hE.textContent)!==S.homeScore){hE.textContent=S.homeScore;if(lH>=0){hE.classList.remove('bump');void hE.offsetWidth;hE.classList.add('bump');}}
  if(aE&&parseInt(aE.textContent)!==S.awayScore){aE.textContent=S.awayScore;if(lA>=0){aE.classList.remove('bump');void aE.offsetWidth;aE.classList.add('bump');}}
  lH=S.homeScore;lA=S.awayScore;

  /* abbr — max 4 chars */
  tx('hAbbr',(S.homeAbbr||'HOME').toUpperCase().slice(0,4));
  tx('aAbbr',(S.awayAbbr||'AWAY').toUpperCase().slice(0,4));

  /* fouls in brace columns */
  const hf=S.homeFouls||0,af=S.awayFouls||0;
  tx('hFouls',hf>0?String(hf):'');
  tx('aFouls',af>0?String(af):'');

  /* quarter fouls (rp1Value feed) — repurpose for shot clock */
  const qfn=parseInt(S.rp1Value||'');
  tx('qf',(!isNaN(qfn)&&qfn>0)?String(qfn):'');

  /* ── COLORS ──
     HOME  : tab = homeColor (text black if light bg)
             logo cell + brace + score = DARK CHARCOAL #2d2d2d
     AWAY  : tab = awayColor darkened
             logo cell + brace + score = awayColor (bright)
  */
  const hc=validHex(S.homeColor)?S.homeColor:'#888888';
  const ac=validHex(S.awayColor)?S.awayColor:'#c8102e';
  const DARK='#2d2d2d';

  /* HOME tab */
  const hT=$('hTab');
  if(hT){
    hT.style.background=hc;
    const txt=hT.querySelector('.tab-txt');
    if(txt)txt.style.color=isLight(hc)?'#111':'#fff';
  }
  /* HOME body — always charcoal */
  [$('hLogoCell'),$('hBraceCol'),$('hScoreSeg')].forEach(el=>{if(el)el.style.background=DARK;});

  /* AWAY body — bright team color */
  [$('aScoreSeg'),$('aBraceCol'),$('aLogoCell')].forEach(el=>{if(el)el.style.background=ac;});
  /* AWAY tab — darkened */
  const aT=$('aTab');
  if(aT){aT.style.background=dk(ac,.6);const txt=aT.querySelector('.tab-txt');if(txt)txt.style.color='#fff';}

  /* logos */
  logo('hCircle',S.homeLogo);
  logo('aCircle',S.awayLogo);

  /* ── BOTTOM STRIP ──
     rp1Title → left side text
     rp2Title + rp2Value → center ticker
     (no BONUS fallback — just empty if not set)
  */
  const left=(S.rp1Title||'').trim();
  const right=(S.rp1Value||'').trim();
  const ctitle=(S.rp2Title||'').trim();
  const cval=(S.rp2Value||'').trim();
  const center=[ctitle,cval].filter(Boolean).join(' – ');

  tx('sLeft',left);
  tx('sRight',right);
  tx('s-txt',center);

  /* show/hide ball icon only when there's center content */
  const ball=$('sBall');
  if(ball)ball.style.display=center?'block':'none';
}

/* ══ AUDIO ══ */
window.addEventListener('load',()=>{const a=new Audio('/buzzer.mp3');a.volume=0;a.play().then(()=>{a.pause();a.currentTime=0;}).catch(()=>{});});
function guzz(){new Audio('/buzzer.mp3').play().catch(()=>{});}
function sbuzz(){new Audio('/buzzer.mp3').play().catch(()=>{});}

/* ══ CONNECT ══ */
function conn(){
  if(useFB&&db){
    db.ref(`states/${FU}`).on('value',sn=>{if(Date.now()-_ll<2000)return;const d=sn.val();if(!d)return;stop();S={...DEF,...d};draw();sync();});
    db.ref(`buzz/${FU}`).on('value',sn=>{if(Date.now()-_ll<2000)return;const m=sn.val();if(!m||m.timestamp<=_lb)return;_lb=m.timestamp;m.kind==='game'?guzz():sbuzz();});
    return;
  }
  const es=new EventSource(`${SRV}/events?user=${encodeURIComponent(CU)}`);
  es.onmessage=e=>{try{const m=JSON.parse(e.data);if(Date.now()-_ll<2000)return;if(m.type==='buzz'){m.kind==='game'?guzz():sbuzz();}else if(m.type==='state'){stop();S={...DEF,...m.data};draw();sync();}}catch(err){}};
  es.onerror=()=>{es.close();setTimeout(conn,2000);};
}
if(useFB&&db){db.ref(`states/${FU}`).once('value').then(sn=>{const d=sn.val();if(d){S={...DEF,...d};draw();sync();}}).catch(()=>{}).finally(()=>conn());}
else{fetch(`${SRV}/state?user=${encodeURIComponent(CU)}`).then(r=>r.json()).then(d=>{if(Object.keys(d).length){S={...DEF,...d};draw();sync();}}).catch(()=>{}).finally(()=>conn());}
</script>
</body>
</html>

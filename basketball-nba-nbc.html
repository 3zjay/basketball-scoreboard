<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NBA – NBC Style Scorebug</title>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="/firebase-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Teko:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background: transparent;
  overflow: hidden;
  width: 100%; height: 100%;
}

/* ═══════════════════════════════════════════════════════
   SCOREBUG — bottom-center, flat horizontal strip
   ═══════════════════════════════════════════════════════ */
#scorebug {
  position: fixed;
  bottom: 2vw;
  left: 50%;
  transform: translateX(-50%);
  display: inline-flex;
  flex-direction: column;
  box-shadow: 0 0.3vw 2vw rgba(0,0,0,0.9);
  border-radius: 0.18vw;
  overflow: hidden;
  /* Width is driven by the sum of children, no min-width needed */
}

/* ═══════════════════════════════════════════════════════
   MAIN ROW  –  target height ≈ 5vw (compact like NBC)
   ═══════════════════════════════════════════════════════ */
.main-row {
  display: flex;
  align-items: stretch;
  height: 5vw;
}

/* ────────────────────────────────────────
   TEAM ABBR TABS  (narrow vertical columns)
   ──────────────────────────────────────── */
.team-tab {
  width: 2.8vw;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  /* background set via JS */
  background: #3a3a3a;
}
/* Vertical text, reading TOP → BOTTOM on both sides */
.tab-abbr {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.15vw;
  font-weight: 900;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.12vw;
  line-height: 1;
  writing-mode: vertical-lr;    /* top → bottom */
  text-orientation: mixed;
  /* NO transform — both tabs read the same direction as NBC */
}

/* ────────────────────────────────────────
   LOGO CELLS  (square = row height)
   ──────────────────────────────────────── */
.logo-seg {
  width: 5vw;          /* = main-row height → square cell */
  flex-shrink: 0;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  /* background set via JS */
  background: #1c1c1c;
}

/* Circular logo container */
.logo-circle {
  width: 4.1vw;
  height: 4.1vw;
  border-radius: 50%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #111;
  flex-shrink: 0;
}
.logo-circle img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.logo-ph {
  font-size: 0.35vw;
  font-weight: 700;
  color: rgba(255,255,255,0.22);
  text-transform: uppercase;
  font-family: 'Barlow Condensed', sans-serif;
}

/* Foul/timeout badge chip */
.logo-badge {
  position: absolute;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.78vw;
  font-weight: 900;
  color: #fff;
  background: rgba(0,0,0,0.75);
  padding: 0.04vw 0.24vw;
  border-radius: 0.15vw;
  line-height: 1.25;
  display: none;
  z-index: 5;
}
.home-badge { top: 0.18vw; right: 0.18vw; }
.away-badge { top: 0.18vw; left:  0.18vw; }

/* ────────────────────────────────────────
   THIN DIVIDERS  (between logo ↔ score)
   ──────────────────────────────────────── */
.score-divider {
  width: 2px;
  flex-shrink: 0;
  background: rgba(255,255,255,0.2);
  align-self: stretch;
}

/* ────────────────────────────────────────
   SCORE BLOCKS
   ──────────────────────────────────────── */
.score-seg {
  width: 5.5vw;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  /* homeScoreSeg → dark neutral (set in JS)  */
  /* awayScoreSeg → bright team color (set in JS) */
  background: #252525;
}
.score-num {
  font-family: 'Teko', sans-serif;
  font-size: 3.6vw;
  font-weight: 700;
  color: #fff;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
@keyframes scoreBump {
  0%   { transform: scale(1);    color: #fff;    }
  40%  { transform: scale(1.22); color: #ffe066; }
  100% { transform: scale(1);    color: #fff;    }
}
.bump { animation: scoreBump 0.38s ease; }

/* ────────────────────────────────────────
   CENTER BLOCK  (clock · period · logo)
   ──────────────────────────────────────── */
.center-seg {
  width: 9vw;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #111111;
  flex-shrink: 0;
  border-left:  1px solid rgba(255,255,255,0.07);
  border-right: 1px solid rgba(255,255,255,0.07);
  padding: 0.3vw 0;
  gap: 0;
}

/* Hoop Culture logo in center */
.hc-logo {
  width: 2vw;
  height: 2vw;
  object-fit: contain;
  margin-bottom: 0.05vw;
  flex-shrink: 0;
}

.clock-val {
  font-family: 'Teko', sans-serif;
  font-size: 2.7vw;
  font-weight: 700;
  color: #fff;
  line-height: 0.92;
  font-variant-numeric: tabular-nums;
  transition: color 0.3s;
}
.clock-val.warn { color: #ff4040; }

.period-row {
  display: flex;
  align-items: center;
  gap: 0.4vw;
  margin-top: 0.1vw;
}
.period-val {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85vw;
  font-weight: 900;
  color: #fff;
  letter-spacing: 0.06vw;
  text-transform: uppercase;
  line-height: 1;
}
.quarter-fouls {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85vw;
  font-weight: 900;
  color: #e82020;
  line-height: 1;
  min-width: 0.6vw;
  text-align: center;
}

/* ═══════════════════════════════════════════════════════
   BOTTOM STRIP
   ═══════════════════════════════════════════════════════ */
.bottom-strip {
  display: flex;
  align-items: center;
  height: 1.3vw;
  background: #0c0c0c;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.bonus-lbl {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.5vw;
  font-weight: 800;
  letter-spacing: 0.18vw;
  color: rgba(255,255,255,0.28);
  text-transform: uppercase;
  padding: 0 0.9vw;
  flex-shrink: 0;
  white-space: nowrap;
  transition: color 0.3s;
}
.bonus-lbl.active { color: #ffe066; }

.strip-sep {
  width: 1px;
  height: 50%;
  background: rgba(255,255,255,0.13);
  flex-shrink: 0;
}
.ticker-center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.35vw;
  overflow: hidden;
  padding: 0 0.4vw;
}
.ticker-ball {
  width: 0.55vw;
  height: 0.55vw;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #f85c0a, #a03800);
  flex-shrink: 0;
}
.ticker-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.55vw;
  font-weight: 800;
  letter-spacing: 0.2vw;
  color: rgba(255,255,255,0.4);
  text-transform: uppercase;
  white-space: nowrap;
  font-style: italic;
}
</style>
</head>
<body>

<div id="scorebug">

  <!-- ══ MAIN ROW ══ -->
  <div class="main-row">

    <!-- ① HOME ABBR TAB -->
    <div class="team-tab" id="homeTab">
      <span class="tab-abbr" id="homeAbbrNBC">HOME</span>
    </div>

    <!-- ② HOME LOGO (circle) -->
    <div class="logo-seg" id="homeLogoSeg">
      <div class="logo-circle" id="homeLogoCircle">
        <div class="logo-ph">LOGO</div>
      </div>
      <div class="logo-badge home-badge" id="homeBadge"></div>
    </div>

    <!-- ③ DIVIDER -->
    <div class="score-divider"></div>

    <!-- ④ HOME SCORE (dark neutral bg) -->
    <div class="score-seg" id="homeScoreSeg">
      <span class="score-num" id="homeScoreNBC">0</span>
    </div>

    <!-- ⑤ CENTER: Hoop Culture logo · clock · period -->
    <div class="center-seg">
      <img class="hc-logo" src="/hoop-culture-logo.png" alt="Hoop Culture">
      <div class="clock-val" id="gameClkNBC">10:00</div>
      <div class="period-row">
        <span class="period-val"  id="periodNBC">1ST</span>
        <span class="quarter-fouls" id="quarterFoulsNBC"></span>
      </div>
    </div>

    <!-- ⑥ AWAY SCORE (bright team-color bg) -->
    <div class="score-seg" id="awayScoreSeg">
      <span class="score-num" id="awayScoreNBC">0</span>
    </div>

    <!-- ⑦ DIVIDER -->
    <div class="score-divider"></div>

    <!-- ⑧ AWAY LOGO (circle) -->
    <div class="logo-seg" id="awayLogoSeg">
      <div class="logo-circle" id="awayLogoCircle">
        <div class="logo-ph">LOGO</div>
      </div>
      <div class="logo-badge away-badge" id="awayBadge"></div>
    </div>

    <!-- ⑨ AWAY ABBR TAB -->
    <div class="team-tab" id="awayTab">
      <span class="tab-abbr" id="awayAbbrNBC">AWAY</span>
    </div>

  </div><!-- /main-row -->

  <!-- ══ BOTTOM STRIP ══ -->
  <div class="bottom-strip">
    <span class="bonus-lbl" id="homeBonusLbl">BONUS</span>
    <div class="strip-sep"></div>
    <div class="ticker-center">
      <div class="ticker-ball"></div>
      <span class="ticker-text" id="tickerTextNBC">NBA BASKETBALL</span>
    </div>
    <div class="strip-sep"></div>
    <span class="bonus-lbl" id="awayBonusLbl">BONUS</span>
  </div>

</div><!-- /scorebug -->

<script>
/* ══════════════════════════════════════════════════════════════
   DATA / SYNC LAYER
   ══════════════════════════════════════════════════════════════ */
const SERVER_URL = (
  window.location.hostname.includes('vercel.app') ||
  window.location.hostname.includes('vercel.sh')
) ? 'https://basketball-scoreboard-o0c7.onrender.com' : '';

const useFirebase = window.location.hostname.includes('vercel.app') ||
                    window.location.hostname.includes('vercel.sh');
let db = null;
if (useFirebase && typeof firebase !== 'undefined' && isFirebaseConfigured) {
  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.database();
  } catch(e) { console.warn('Firebase init failed:', e); }
}

const urlParams   = new URLSearchParams(window.location.search);
const currentUser = urlParams.get('user') || localStorage.getItem('hc_session_user') || 'default';
const fbUser      = currentUser.replace(/[\.#$\[\]]/g, '_');

let _lastLocalMsgTime = 0;
const bc = new BroadcastChannel('hc_scoreboard_sync');
bc.onmessage = (e) => {
  const msg = e.data;
  if (!msg || msg.user !== fbUser) return;
  _lastLocalMsgTime = Date.now();
  if (msg.type === 'state') {
    stopLocalTick(); S = { ...S, ...msg.data }; render(); syncLocalTick();
  } else if (msg.type === 'buzz') {
    if (msg.timestamp > _lastBuzzTime) {
      _lastBuzzTime = msg.timestamp;
      if (msg.kind === 'game') playGameBuzzer(); else playShotBuzzer();
    }
  }
};

/* Default state */
const DEF = {
  homeScore: 0, awayScore: 0,
  homeFouls: 0, awayFouls: 0,
  homeBonus: false, awayBonus: false,
  homeAbbr: 'HOME', homeColor: '#4a4a4a', homeLogo: null,
  awayAbbr: 'AWAY', awayColor: '#c8102e', awayLogo: null,
  quarter: 1, gameSeconds: 600, shotSeconds: 24,
  gameRunning: false, shotRunning: false,
  possession: null,
  rp1Title: '', rp1Value: '',
};
const PERIODS = ['1ST','2ND','3RD','4TH','OT','2OT'];
let S = { ...DEF };
let _lastBuzzTime = 0;
let lastHome = -1, lastAway = -1;

/* Local tick */
let localTick = null;
function startLocalTick() {
  if (localTick) return;
  localTick = setInterval(() => {
    if (S.gameRunning && S.gameSeconds > 0) { S.gameSeconds--; renderClocks(); }
    if (S.shotRunning && S.shotSeconds > 0) { S.shotSeconds--; renderClocks(); }
  }, 1000);
}
function stopLocalTick()  { clearInterval(localTick); localTick = null; }
function syncLocalTick()  { if (S.gameRunning || S.shotRunning) startLocalTick(); else stopLocalTick(); }

/* Helpers */
function g(id)   { return document.getElementById(id); }
function t(id,v) { const e = g(id); if (e) e.textContent = v; }

function isHex(h) { return h && typeof h === 'string' && /^#[0-9a-fA-F]{6}/.test(h); }

function darken(hex, pct) {
  if (!isHex(hex)) return '#1c1c1c';
  const r = parseInt(hex.slice(1,3),16),
        gv = parseInt(hex.slice(3,5),16),
        b  = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*pct)},${Math.round(gv*pct)},${Math.round(b*pct)})`;
}

/* Clock */
function renderClocks() {
  const gs  = S.gameSeconds;
  const m   = Math.floor(gs / 60);
  const sec = gs % 60;
  const val = gs < 60 ? `${gs}.0` : `${m}:${sec.toString().padStart(2,'0')}`;
  const clk = g('gameClkNBC');
  if (clk) { clk.textContent = val; clk.className = 'clock-val' + (gs <= 30 ? ' warn' : ''); }
}

/* Logo setter — updates innerHTML of the persistent circle div */
function setLogo(circleId, url) {
  const c = g(circleId);
  if (!c) return;
  if (url) {
    c.innerHTML = `<img src="${url}" alt="" style="width:100%;height:100%;object-fit:contain;">`;
  } else {
    c.innerHTML = `<div class="logo-ph">LOGO</div>`;
  }
}

/* Main render */
function render() {
  /* Period */
  const qL = typeof S.quarter === 'number' ? (PERIODS[S.quarter-1] || `Q${S.quarter}`) : S.quarter;
  t('periodNBC', qL);
  renderClocks();

  /* Scores with bump */
  const hEl = g('homeScoreNBC'), aEl = g('awayScoreNBC');
  if (hEl && parseInt(hEl.textContent) !== S.homeScore) {
    hEl.textContent = S.homeScore;
    if (lastHome >= 0) { hEl.classList.remove('bump'); void hEl.offsetWidth; hEl.classList.add('bump'); }
  }
  if (aEl && parseInt(aEl.textContent) !== S.awayScore) {
    aEl.textContent = S.awayScore;
    if (lastAway >= 0) { aEl.classList.remove('bump'); void aEl.offsetWidth; aEl.classList.add('bump'); }
  }
  lastHome = S.homeScore; lastAway = S.awayScore;

  /* Abbr — cap at 4 chars to prevent overflow */
  t('homeAbbrNBC', (S.homeAbbr || 'HOME').toUpperCase().slice(0,4));
  t('awayAbbrNBC', (S.awayAbbr || 'AWAY').toUpperCase().slice(0,4));

  /* Foul badges */
  const hf = S.homeFouls || 0, af = S.awayFouls || 0;
  const hB = g('homeBadge'), aB = g('awayBadge');
  if (hB) { hB.textContent = hf; hB.style.display = hf > 0 ? 'block' : 'none'; }
  if (aB) { aB.textContent = af; aB.style.display = af > 0 ? 'block' : 'none'; }

  /* Quarter fouls via rp1Value */
  const qfNum = parseInt(S.rp1Value || '');
  t('quarterFoulsNBC', (!isNaN(qfNum) && qfNum > 0) ? String(qfNum) : '');

  /* Bonus */
  const hBl = g('homeBonusLbl'), aBl = g('awayBonusLbl');
  if (hBl) hBl.className = 'bonus-lbl' + (S.homeBonus ? ' active' : '');
  if (aBl) aBl.className = 'bonus-lbl' + (S.awayBonus ? ' active' : '');

  /* Ticker */
  const tkEl = g('tickerTextNBC');
  if (tkEl) tkEl.textContent = (S.rp1Title && S.rp1Title.trim()) ? S.rp1Title.trim().toUpperCase() : 'NBA BASKETBALL';

  /* Colors */
  const hc = isHex(S.homeColor) ? S.homeColor : '#4a4a4a';
  const ac = isHex(S.awayColor) ? S.awayColor : '#c8102e';

  /* HOME  — abbr tab = team color, score = dark tint, logo bg = very dark tint */
  const hTab = g('homeTab'), hSS = g('homeScoreSeg'), hLS = g('homeLogoSeg');
  if (hTab) hTab.style.background = hc;
  if (hSS)  hSS.style.background  = darken(hc, 0.52);
  if (hLS)  hLS.style.background   = darken(hc, 0.35);

  /* AWAY  — score = full bright team color, abbr tab = darkened, logo bg = very dark tint */
  const aTab = g('awayTab'), aSS = g('awayScoreSeg'), aLS = g('awayLogoSeg');
  if (aSS)  aSS.style.background  = ac;             /* BRIGHT — matches NBC away score */
  if (aTab) aTab.style.background = darken(ac, 0.6); /* darker shade for tab */
  if (aLS)  aLS.style.background  = darken(ac, 0.35);

  /* Logos */
  setLogo('homeLogoCircle', S.homeLogo);
  setLogo('awayLogoCircle', S.awayLogo);
}

/* Audio */
window.addEventListener('load', () => {
  const a = new Audio('/buzzer.mp3'); a.volume = 0;
  a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {});
});
function playGameBuzzer() { const a = new Audio('/buzzer.mp3'); a.volume = 1; a.play().catch(() => {}); }
function playShotBuzzer() { const a = new Audio('/buzzer.mp3'); a.volume = 1; a.play().catch(() => {}); }

/* Connection */
function connectSSE() {
  if (useFirebase && db) {
    db.ref(`states/${fbUser}`).on('value', snap => {
      if (Date.now() - _lastLocalMsgTime < 2000) return;
      const d = snap.val(); if (!d) return;
      stopLocalTick(); S = { ...DEF, ...d }; render(); syncLocalTick();
    });
    db.ref(`buzz/${fbUser}`).on('value', snap => {
      if (Date.now() - _lastLocalMsgTime < 2000) return;
      const msg = snap.val();
      if (!msg || msg.timestamp <= _lastBuzzTime) return;
      _lastBuzzTime = msg.timestamp;
      if (msg.kind === 'game') playGameBuzzer(); else playShotBuzzer();
    });
    return;
  }
  const es = new EventSource(`${SERVER_URL}/events?user=${encodeURIComponent(currentUser)}`);
  es.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (Date.now() - _lastLocalMsgTime < 2000) return;
      if (msg.type === 'buzz') { if (msg.kind === 'game') playGameBuzzer(); else playShotBuzzer(); }
      else if (msg.type === 'state') { stopLocalTick(); S = { ...DEF, ...msg.data }; render(); syncLocalTick(); }
    } catch(err) {}
  };
  es.onerror = () => { es.close(); setTimeout(connectSSE, 2000); };
}

/* Bootstrap */
if (useFirebase && db) {
  db.ref(`states/${fbUser}`).once('value').then(snap => {
    const d = snap.val();
    if (d) { S = { ...DEF, ...d }; render(); syncLocalTick(); }
  }).catch(() => {}).finally(() => connectSSE());
} else {
  fetch(`${SERVER_URL}/state?user=${encodeURIComponent(currentUser)}`)
    .then(r => r.json())
    .then(d => { if (Object.keys(d).length) { S = { ...DEF, ...d }; render(); syncLocalTick(); } })
    .catch(() => {})
    .finally(() => connectSSE());
}
</script>
</body>
</html>

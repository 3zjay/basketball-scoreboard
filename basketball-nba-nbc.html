<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NBA – NBC Scorebug</title>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="/firebase-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,700;1,800&family=Teko:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background: transparent;
  overflow: hidden;
  width: 100%; height: 100%;
  font-family: 'Barlow Condensed', sans-serif;
}

/* ══════════════════════════════════════════════════════
   ROOT SCOREBUG — anchored bottom-center, 2-row strip
   ══════════════════════════════════════════════════════ */
#scorebug {
  position: fixed;
  bottom: 1.5vw;
  left: 50%;
  transform: translateX(-50%);
  display: inline-flex;
  flex-direction: column;
  min-width: 52vw;
  box-shadow: 0 0.5vw 3vw rgba(0,0,0,0.85);
  border-radius: 0.25vw;
  overflow: hidden;
}

/* ══════════════════════════════════════════════════════
   TOP MAIN ROW
   ══════════════════════════════════════════════════════ */
.main-row {
  display: flex;
  align-items: stretch;
  height: 6.2vw;
}

/* ── HOME ABBR TAB ── */
.home-abbr-tab {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 0.7vw;
  min-width: 4vw;
  background: #3a3a3a;
  flex-shrink: 0;
}
.abbr-text {
  font-size: 1.55vw;
  font-weight: 900;
  color: #fff;
  letter-spacing: 0.04vw;
  text-transform: uppercase;
  line-height: 1;
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
}

/* ── LOGO CELL (home + away) ── */
.logo-cell {
  position: relative;
  width: 6.2vw;
  height: 6.2vw;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  background: #222;
  overflow: visible;
}
.logo-cell img {
  width: 5.2vw;
  height: 5.2vw;
  object-fit: contain;
  position: relative;
  z-index: 1;
}
.logo-ph {
  font-size: 0.5vw;
  font-weight: 700;
  color: rgba(255,255,255,0.25);
  text-transform: uppercase;
  text-align: center;
}
/* Timeout / foul badge on logo corner */
.logo-badge {
  position: absolute;
  top: 0.25vw;
  right: 0.25vw;
  z-index: 10;
  font-size: 0.75vw;
  font-weight: 900;
  color: #fff;
  background: rgba(0,0,0,0.72);
  border-radius: 0.2vw;
  padding: 0.05vw 0.28vw;
  line-height: 1.2;
  font-family: 'Barlow Condensed', sans-serif;
  display: none; /* shown when value > 0 */
}

/* ── HOME SCORE BLOCK ── */
.home-score-seg {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 1.3vw;
  min-width: 6.5vw;
  flex-shrink: 0;
  background: #2a2a2a;
}
.score-num {
  font-family: 'Teko', sans-serif;
  font-size: 4.3vw;
  font-weight: 700;
  color: #fff;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
@keyframes scoreBump {
  0%   { transform:scale(1); color:#fff; }
  40%  { transform:scale(1.22); color:#ffe066; }
  100% { transform:scale(1); color:#fff; }
}
.bump { animation: scoreBump 0.38s ease; }

/* ── CENTER BLOCK ── */
.center-seg {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #1c1c1c;
  padding: 0 1.4vw;
  flex-shrink: 0;
  min-width: 10vw;
  gap: 0;
  border-left: 1px solid rgba(255,255,255,0.08);
  border-right: 1px solid rgba(255,255,255,0.08);
}
/* NBC peacock SVG logo */
.nbc-logo {
  width: 2.6vw;
  height: 2.6vw;
  margin-bottom: 0.1vw;
  flex-shrink: 0;
}
.clock-val {
  font-family: 'Teko', sans-serif;
  font-size: 2.7vw;
  font-weight: 700;
  color: #fff;
  line-height: 1;
  font-variant-numeric: tabular-nums;
  transition: color 0.3s;
}
.clock-val.warn { color: #ff5050; }
.period-row {
  display: flex;
  align-items: center;
  gap: 0.5vw;
  margin-top: 0.05vw;
}
.period-val {
  font-size: 1.05vw;
  font-weight: 900;
  color: #fff;
  letter-spacing: 0.06vw;
  text-transform: uppercase;
  line-height: 1;
}
.quarter-fouls {
  font-size: 1.05vw;
  font-weight: 900;
  color: #e82828;
  line-height: 1;
  min-width: 1vw;
  text-align: center;
}

/* ── AWAY SCORE BLOCK ── */
.away-score-seg {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 1.3vw;
  min-width: 6.5vw;
  flex-shrink: 0;
  background: #2a2a2a;
}

/* ── AWAY LOGO cell (reuses .logo-cell) ── */

/* ── AWAY ABBR TAB ── */
.away-abbr-tab {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 0.7vw;
  min-width: 4vw;
  background: #c8102e;
  flex-shrink: 0;
}

/* Possession indicator — thin glowing strip on the inner edge of logo cell */
.poss-strip {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 0.28vw;
  background: #fff;
  box-shadow: 0 0 0.5vw #fff, 0 0 1.2vw #ffe066;
  opacity: 0;
  transition: opacity 0.3s;
  z-index: 5;
}
.poss-strip.on { opacity: 1; }

/* ══════════════════════════════════════════════════════
   BOTTOM STRIP
   ══════════════════════════════════════════════════════ */
.bottom-strip {
  display: flex;
  align-items: center;
  height: 1.55vw;
  background: #111;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.bonus-lbl {
  font-size: 0.6vw;
  font-weight: 800;
  letter-spacing: 0.14vw;
  color: rgba(255,255,255,0.6);
  text-transform: uppercase;
  white-space: nowrap;
  padding: 0 1.2vw;
  flex-shrink: 0;
}
.bonus-lbl.active {
  color: #ffe066;
}
.ticker-center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.ticker-text {
  font-size: 0.65vw;
  font-weight: 800;
  letter-spacing: 0.18vw;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  white-space: nowrap;
}
/* NBA ball icon in center ticker */
.nba-ball {
  display: inline-block;
  width: 0.7vw;
  height: 0.7vw;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #f85c0a, #c84800);
  border: 1px solid rgba(0,0,0,0.4);
  vertical-align: middle;
  margin-right: 0.35vw;
  position: relative;
  top: -0.05vw;
}
</style>
</head>
<body>

<div id="scorebug">

  <!-- ── MAIN ROW ── -->
  <div class="main-row">

    <!-- HOME ABBR TAB -->
    <div class="home-abbr-tab" id="homeAbbrTab">
      <div class="abbr-text" id="homeAbbrNBC">HOME</div>
    </div>

    <!-- HOME LOGO -->
    <div class="logo-cell" id="homeLogoCell">
      <div id="homeLogoNBC" class="logo-ph">LOGO</div>
      <div class="logo-badge" id="homeBadge">0</div>
      <div class="poss-strip" id="possHome"></div>
    </div>

    <!-- HOME SCORE -->
    <div class="home-score-seg" id="homeScoreSeg">
      <div class="score-num" id="homeScoreNBC">0</div>
    </div>

    <!-- CENTER: NBC logo + clock + period -->
    <div class="center-seg">
      <!-- NBC Peacock SVG -->
      <svg class="nbc-logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <!-- Peacock feathers -->
        <ellipse cx="50" cy="52" rx="5" ry="5" fill="#fff"/>
        <!-- 6 feathers radiating outward -->
        <ellipse cx="50" cy="30" rx="5" ry="16" fill="#e8262b" transform="rotate(0 50 52)"/>
        <ellipse cx="50" cy="30" rx="5" ry="16" fill="#f5a623" transform="rotate(60 50 52)"/>
        <ellipse cx="50" cy="30" rx="5" ry="16" fill="#f5e623" transform="rotate(120 50 52)"/>
        <ellipse cx="50" cy="30" rx="5" ry="16" fill="#2bba49" transform="rotate(180 50 52)"/>
        <ellipse cx="50" cy="30" rx="5" ry="16" fill="#2b6dba" transform="rotate(240 50 52)"/>
        <ellipse cx="50" cy="30" rx="5" ry="16" fill="#9f2bba" transform="rotate(300 50 52)"/>
        <!-- white center disc -->
        <circle cx="50" cy="52" r="7" fill="#fff"/>
      </svg>
      <div class="clock-val" id="gameClkNBC">10:00</div>
      <div class="period-row">
        <div class="period-val" id="periodNBC">1ST</div>
        <div class="quarter-fouls" id="quarterFoulsNBC"></div>
      </div>
    </div>

    <!-- AWAY SCORE -->
    <div class="away-score-seg" id="awayScoreSeg">
      <div class="score-num" id="awayScoreNBC">0</div>
    </div>

    <!-- AWAY LOGO -->
    <div class="logo-cell" id="awayLogoCell">
      <div id="awayLogoNBC" class="logo-ph">LOGO</div>
      <div class="logo-badge" id="awayBadge">0</div>
      <div class="poss-strip" id="possAway"></div>
    </div>

    <!-- AWAY ABBR TAB -->
    <div class="away-abbr-tab" id="awayAbbrTab">
      <div class="abbr-text" id="awayAbbrNBC">AWAY</div>
    </div>

  </div><!-- /main-row -->

  <!-- ── BOTTOM STRIP ── -->
  <div class="bottom-strip">
    <div class="bonus-lbl" id="homeBonusLbl">BONUS</div>
    <div class="ticker-center">
      <div class="ticker-text">
        <span class="nba-ball"></span>
        <span id="tickerTextNBC">NBA BASKETBALL</span>
      </div>
    </div>
    <div class="bonus-lbl" id="awayBonusLbl">BONUS</div>
  </div>

</div><!-- /scorebug -->

<script>
/* ══════════════════════════════════════════════════════════
   DATA LAYER — identical Firebase / SSE / BroadcastChannel
   pattern used by all other overlays in this project
   ══════════════════════════════════════════════════════════ */
const SERVER_URL = (
  window.location.hostname.includes('vercel.app') ||
  window.location.hostname.includes('vercel.sh')
) ? 'https://basketball-scoreboard-o0c7.onrender.com' : '';

const useFirebase = window.location.hostname.includes('vercel.app') ||
                    window.location.hostname.includes('vercel.sh');
let db = null;
if (useFirebase && typeof firebase !== 'undefined' && isFirebaseConfigured) {
  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.database();
  } catch(e) { console.warn('Firebase init failed:', e); }
}

const urlParams   = new URLSearchParams(window.location.search);
const currentUser = urlParams.get('user') || localStorage.getItem('hc_session_user') || 'default';
const fbUser      = currentUser.replace(/[\.#$\[\]]/g, '_');

let _lastLocalMsgTime = 0;
const bc = new BroadcastChannel('hc_scoreboard_sync');
bc.onmessage = (e) => {
  const msg = e.data;
  if (!msg || msg.user !== fbUser) return;
  _lastLocalMsgTime = Date.now();
  if (msg.type === 'state') {
    stopLocalTick();
    S = { ...S, ...msg.data };
    render();
    syncLocalTick();
  } else if (msg.type === 'buzz') {
    if (msg.timestamp > _lastBuzzTime) {
      _lastBuzzTime = msg.timestamp;
      if (msg.kind === 'game') playGameBuzzer(); else playShotBuzzer();
    }
  }
};

/* Default state */
const DEF = {
  homeScore: 0, awayScore: 0,
  homeFouls: 0, awayFouls: 0,
  homeBonus: false, awayBonus: false,
  homeAbbr: 'HOME', homeColor: '#3a3a3a', homeLogo: null,
  awayAbbr: 'AWAY', awayColor: '#c8102e', awayLogo: null,
  quarter: 1, gameSeconds: 600, shotSeconds: 24,
  gameRunning: false, shotRunning: false,
  possession: null,
  rp1Title: '', rp1Value: '',   // used for game title / venue
};
const PERIODS = ['1ST','2ND','3RD','4TH','OT','2OT'];
let S = { ...DEF };

/* Local clock tick */
let localTick = null;
function startLocalTick() {
  if (localTick) return;
  localTick = setInterval(() => {
    if (S.gameRunning && S.gameSeconds > 0) { S.gameSeconds--; renderClocks(); }
    if (S.shotRunning && S.shotSeconds > 0) { S.shotSeconds--; renderClocks(); }
  }, 1000);
}
function stopLocalTick()  { clearInterval(localTick); localTick = null; }
function syncLocalTick()  { if (S.gameRunning || S.shotRunning) startLocalTick(); else stopLocalTick(); }

/* Helpers */
function s(id, val) { const e = document.getElementById(id); if (e) e.textContent = val; }

function lighten(hex, pct = 0.35) {
  let r = parseInt(hex.slice(1,3),16),
      g = parseInt(hex.slice(3,5),16),
      b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, Math.round(r + (255-r)*pct));
  g = Math.min(255, Math.round(g + (255-g)*pct));
  b = Math.min(255, Math.round(b + (255-b)*pct));
  return `rgb(${r},${g},${b})`;
}
function darken(hex, pct = 0.45) {
  let r = parseInt(hex.slice(1,3),16),
      g = parseInt(hex.slice(3,5),16),
      b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*pct)},${Math.round(g*pct)},${Math.round(b*pct)})`;
}

/* ── RENDER CLOCKS ── */
function renderClocks() {
  const m   = Math.floor(S.gameSeconds / 60);
  const sec = S.gameSeconds % 60;
  // NBC style: show tenths in last minute
  let txt;
  if (S.gameSeconds < 60) {
    txt = `${S.gameSeconds}.0`;
  } else {
    txt = `${m}:${sec.toString().padStart(2,'0')}`;
  }
  const clk = document.getElementById('gameClkNBC');
  if (clk) {
    clk.textContent = txt;
    clk.className   = 'clock-val' + (S.gameSeconds <= 30 ? ' warn' : '');
  }
}

/* ── RENDER FULL STATE ── */
let lastHome = -1, lastAway = -1;
let _lastBuzzTime = 0;

function render() {
  const qL = typeof S.quarter === 'number' ? (PERIODS[S.quarter-1] || `Q${S.quarter}`) : S.quarter;
  s('periodNBC', qL);
  renderClocks();

  /* Scores with bump */
  const hEl = document.getElementById('homeScoreNBC');
  const aEl = document.getElementById('awayScoreNBC');
  if (hEl && parseInt(hEl.textContent) !== S.homeScore) {
    hEl.textContent = S.homeScore;
    if (lastHome >= 0) { hEl.classList.remove('bump'); void hEl.offsetWidth; hEl.classList.add('bump'); }
  }
  if (aEl && parseInt(aEl.textContent) !== S.awayScore) {
    aEl.textContent = S.awayScore;
    if (lastAway >= 0) { aEl.classList.remove('bump'); void aEl.offsetWidth; aEl.classList.add('bump'); }
  }
  lastHome = S.homeScore; lastAway = S.awayScore;

  /* Abbreviations */
  s('homeAbbrNBC', (S.homeAbbr || 'HOME').toUpperCase());
  s('awayAbbrNBC', (S.awayAbbr || 'AWAY').toUpperCase());

  /* Fouls / timeout badges */
  const hFouls = S.homeFouls || 0;
  const aFouls = S.awayFouls || 0;
  const hBadge = document.getElementById('homeBadge');
  const aBadge = document.getElementById('awayBadge');
  if (hBadge) { hBadge.textContent = hFouls; hBadge.style.display = hFouls > 0 ? 'block' : 'none'; }
  if (aBadge) { aBadge.textContent = aFouls; aBadge.style.display = aFouls > 0 ? 'block' : 'none'; }

  /* Quarter fouls (uses rp1Value as a hook — shows only if numeric) */
  const qfRaw = S.rp1Value || '';
  const qfNum = parseInt(qfRaw);
  const qfEl  = document.getElementById('quarterFoulsNBC');
  if (qfEl) qfEl.textContent = (!isNaN(qfNum) && qfNum > 0) ? qfNum : '';

  /* Bonus indicators */
  const hBonusEl = document.getElementById('homeBonusLbl');
  const aBonusEl = document.getElementById('awayBonusLbl');
  if (hBonusEl) hBonusEl.className = 'bonus-lbl' + (S.homeBonus ? ' active' : '');
  if (aBonusEl) aBonusEl.className = 'bonus-lbl' + (S.awayBonus ? ' active' : '');

  /* Ticker text — uses rp1Title if set, otherwise generic */
  const tickerEl = document.getElementById('tickerTextNBC');
  if (tickerEl) tickerEl.textContent = (S.rp1Title && S.rp1Title.trim()) ? S.rp1Title.trim().toUpperCase() : 'NBA BASKETBALL';

  /* Team colors */
  const hc = (S.homeColor && S.homeColor.startsWith('#') && S.homeColor.length >= 7) ? S.homeColor : '#3a3a3a';
  const ac = (S.awayColor && S.awayColor.startsWith('#') && S.awayColor.length >= 7) ? S.awayColor : '#c8102e';

  /* Abbr tab backgrounds */
  const hTab = document.getElementById('homeAbbrTab');
  const aTab = document.getElementById('awayAbbrTab');
  if (hTab) hTab.style.background = hc;
  if (aTab) aTab.style.background = ac;

  /* Score seg — slightly darkened team color */
  const hSeg = document.getElementById('homeScoreSeg');
  const aSeg = document.getElementById('awayScoreSeg');
  if (hSeg) hSeg.style.background = darken(hc, 0.6);
  if (aSeg) aSeg.style.background = darken(ac, 0.6);

  /* Home logo */
  const hLC = document.getElementById('homeLogoCell');
  const hLogoEl = document.getElementById('homeLogoNBC');
  if (hLC) {
    hLC.style.background = darken(hc, 0.3);
    hLC.style.boxShadow  = `inset 0 0 1.5vw ${hc}55`;
  }
  if (hLogoEl) {
    if (S.homeLogo) {
      hLogoEl.outerHTML = `<img id="homeLogoNBC" src="${S.homeLogo}" alt="">`;
    } else {
      const existing = document.getElementById('homeLogoNBC');
      if (existing && existing.tagName === 'IMG') {
        existing.outerHTML = `<div id="homeLogoNBC" class="logo-ph">LOGO</div>`;
      }
    }
  }

  /* Away logo */
  const aLC = document.getElementById('awayLogoCell');
  const aLogoEl = document.getElementById('awayLogoNBC');
  if (aLC) {
    aLC.style.background = darken(ac, 0.3);
    aLC.style.boxShadow  = `inset 0 0 1.5vw ${ac}55`;
  }
  if (aLogoEl) {
    if (S.awayLogo) {
      aLogoEl.outerHTML = `<img id="awayLogoNBC" src="${S.awayLogo}" alt="">`;
    } else {
      const existing = document.getElementById('awayLogoNBC');
      if (existing && existing.tagName === 'IMG') {
        existing.outerHTML = `<div id="awayLogoNBC" class="logo-ph">LOGO</div>`;
      }
    }
  }

  /* Possession glowing strip */
  document.getElementById('possHome')?.classList.toggle('on', S.possession === 'home');
  document.getElementById('possAway')?.classList.toggle('on', S.possession === 'away');
}

/* ── AUDIO ── */
window.addEventListener('load', () => {
  const a = new Audio('/buzzer.mp3'); a.volume = 0;
  a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {});
});
function playGameBuzzer() { const a = new Audio('/buzzer.mp3'); a.volume = 1.0; a.play().catch(() => {}); }
function playShotBuzzer() { const a = new Audio('/buzzer.mp3'); a.volume = 1.0; a.play().catch(() => {}); }

/* ── SSE / FIREBASE CONNECTION ── */
function connectSSE() {
  if (useFirebase && db) {
    db.ref(`states/${fbUser}`).on('value', snapshot => {
      if (Date.now() - _lastLocalMsgTime < 2000) return;
      const d = snapshot.val();
      if (!d) return;
      stopLocalTick(); S = { ...DEF, ...d }; render(); syncLocalTick();
    });
    db.ref(`buzz/${fbUser}`).on('value', snapshot => {
      if (Date.now() - _lastLocalMsgTime < 2000) return;
      const msg = snapshot.val();
      if (!msg || msg.timestamp <= _lastBuzzTime) return;
      _lastBuzzTime = msg.timestamp;
      if (msg.kind === 'game') playGameBuzzer(); else playShotBuzzer();
    });
    return;
  }
  const es = new EventSource(`${SERVER_URL}/events?user=${encodeURIComponent(currentUser)}`);
  es.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'buzz') {
        if (Date.now() - _lastLocalMsgTime < 2000) return;
        if (msg.kind === 'game') playGameBuzzer(); else playShotBuzzer();
      } else if (msg.type === 'state') {
        if (Date.now() - _lastLocalMsgTime < 2000) return;
        stopLocalTick(); S = { ...DEF, ...msg.data }; render(); syncLocalTick();
      }
    } catch(err) {}
  };
  es.onerror = () => { es.close(); setTimeout(connectSSE, 2000); };
}

/* ── BOOTSTRAP ── */
if (useFirebase && db) {
  db.ref(`states/${fbUser}`).once('value').then(snapshot => {
    const data = snapshot.val();
    if (data) { S = { ...DEF, ...data }; render(); syncLocalTick(); }
  }).catch(() => {}).finally(() => { connectSSE(); });
} else {
  fetch(`${SERVER_URL}/state?user=${encodeURIComponent(currentUser)}`)
    .then(r => r.json())
    .then(d => { if (Object.keys(d).length) { S = { ...DEF, ...d }; render(); syncLocalTick(); } })
    .catch(() => {})
    .finally(() => { connectSSE(); });
}
</script>
</body>
</html>

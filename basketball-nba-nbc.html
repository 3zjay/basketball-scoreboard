<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NBA – NBC Style Scorebug</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="/firebase-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Teko:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;width:100%;height:100%}

/* ══════════════════════════════════════════════
   ROOT — fixed bottom-center
   ══════════════════════════════════════════════ */
#bug{
  position:fixed;
  bottom:2vw;left:50%;
  transform:translateX(-50%);
  display:inline-flex;
  flex-direction:column;
  box-shadow:0 .4vw 2.5vw rgba(0,0,0,.9);
  border-radius:3.1vw;
  overflow:hidden;
  background:#141414;        /* dark background to prevent light subpixel gaps */
}

#top-bar{
  height:0.75vw;
  display:flex;
  align-items:stretch;
  border-bottom:0.05vw solid rgba(0,0,0,0.18);
  flex-shrink:0;
  margin-bottom:-0.05vw;     /* vertical subpixel gap fix */
  position:relative;
  z-index:2;
  background:#141414;        /* background for the center and gaps */
}
#hTopBar{
  width:11.3vw;
  height:100%;
  flex-shrink:0;
}
#ctrTopBar{
  width:8.8vw;
  height:100%;
  background:#141414;
  flex-shrink:0;
}
#aTopBar{
  width:11.3vw;
  height:100%;
  flex-shrink:0;
}

/* ══════════════════════════════════════════════
   MAIN ROW — 4.2vw tall (compact, like NBC)

   Exact element order left→right:
   [hTAB][hLOGO][hBRACE][hSCORE][CTR][aSCORE][aBRACE][aLOGO][aTAB]

   Home body  = always dark charcoal #2d2d2d
   Home tab   = homeColor bg  (text color auto)
   Away body  = awayColor (full bright)
   Away tab   = awayColor darkened 60%
   ══════════════════════════════════════════════ */
#row{
  display:flex;
  align-items:stretch;
  height:4.2vw;
  position:relative;
  z-index:1;
}

/* ─── ABBR TABS ───
   Key fix: rotate(90deg) = first char at TOP, last at BOTTOM ✓
   No writing-mode — that was causing the upside-down bug.
*/
.tab{
  width:3.5vw;
  overflow:hidden;
  flex-shrink:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#888;          /* JS sets homeColor / dk(awayColor,.6) */
  position:relative;
  z-index:1;
}
#hTab{
  border-top-left-radius:2.1vw;
  border-bottom-left-radius:2.1vw;
}
#aTab{
  border-top-right-radius:2.1vw;
  border-bottom-right-radius:2.1vw;
}
.tab-txt{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.95vw;
  font-weight:900;
  color:#fff;               /* JS may set to #111 for light tabs */
  text-transform:uppercase;
  line-height:0.82vw;       /* tight vertical stacking of letters */
  letter-spacing:0;
}
.tab-txt span{
  display:block;
  text-align:center;
}

/* ─── LOGO CELLS (square = row height) ─── */
.logo-wrapper{
  width:4.5vw;              /* elongated capsule end */
  flex-shrink:0;
  display:flex;
  align-items:stretch;
  overflow:hidden;
  position:relative;
  z-index:1;
}
.logo-cell{
  width:100%;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#2d2d2d;       /* JS sets background color dynamically */
  overflow:hidden;
}
#hLogoCell{
  border-top-left-radius:2.1vw;
  border-bottom-left-radius:2.1vw;
}
#aLogoCell{
  border-top-right-radius:2.1vw;
  border-bottom-right-radius:2.1vw;
}
.circle{
  width:4.05vw;height:4.05vw;
  border-radius:50%;
  overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 40% 35%, #2e2e2e, #111);
  flex-shrink:0;
  border:0.14vw double rgba(255,255,255,0.85);
  box-shadow:inset 0 0 .4vw rgba(0,0,0,.8), 0 0.1vw 0.3vw rgba(0,0,0,0.5);
}
.circle img{width:90%;height:90%;object-fit:contain}
.no-logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.28vw;font-weight:700;
  color:rgba(255,255,255,.15);text-transform:uppercase;
}

/* ─── BRACE COLUMN (fouls + high-end SVG brace) ─── */
.brace-col{
  width:1.6vw;
  flex-shrink:0;
  display:flex;
  align-items:stretch;
  justify-content:center;
  background:#2d2d2d;       /* JS: home=dark, away=team color */
  position:relative;
  z-index:1;
}
.brace-svg{
  width:100%;
  height:100%;
  display:block;
}

/* ─── SCORE BLOCKS ─── */
.score-seg{
  width:5.2vw;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  background:#2d2d2d;       /* JS: home=dark, away=team color */
  position:relative;
  z-index:1;
}
.score-num{
  font-family:'Teko',sans-serif;
  font-size:3.2vw;font-weight:700;
  color:inherit;line-height:1;
  font-variant-numeric:tabular-nums;
}
@keyframes bump{
  0%  {transform:scale(1)}
  40% {transform:scale(1.22);color:#ffe066}
  100%{transform:scale(1)}
}
.bump{animation:bump .38s ease}

/* ─── CENTER BLOCK ─── */
#ctr{
  width:8.8vw;flex-shrink:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#141414;
  border-left:1px solid rgba(255,255,255,.08);
  border-right:1px solid rgba(255,255,255,.08);
  gap:.04vw;
}
#hcLogo{
  width:1.5vw;height:1.5vw;
  object-fit:contain;
  border-radius:50%;
  margin-bottom:.02vw;
  flex-shrink:0;
  overflow:hidden;
}
#clk{
  font-family:'Teko',sans-serif;
  font-size:2.15vw;font-weight:700;
  color:#fff;line-height:.9;
  font-variant-numeric:tabular-nums;
  transition:color .3s;
}
#clk.warn{color:#ff4040}
#prow{
  display:flex;align-items:baseline;gap:.35vw;
  margin-top:.04vw;
}
#per{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.74vw;font-weight:900;
  color:#fff;letter-spacing:.06vw;text-transform:uppercase;
}
#sc{
  font-family:'Teko',sans-serif;
  font-size:1vw;font-weight:700;
  color:#f5c842;
  line-height:.9;
  font-variant-numeric:tabular-nums;
  transition:color .3s;
}
#sc.warn{color:#ff4040}
#qf{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.74vw;font-weight:900;
  color:#e82020;
}

/* ══════════════════════════════════════════════
   BOTTOM STRIP — Clean Centered Broadcast Info
   ══════════════════════════════════════════════ */
#strip{
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:1.25vw;
  background:linear-gradient(to bottom, #181818 0%, #0c0c0c 50%, #020202 100%);
  border-top:0.06vw solid rgba(255,255,255,0.18);
  box-shadow:inset 0 0.05vw 0.1vw rgba(255,255,255,0.05);
  padding:0 1.2vw;
  box-sizing:border-box;
}
.strip-text{
  font-family:'Barlow Condensed',sans-serif;
  font-size:0.58vw;
  font-weight:900;
  color:rgba(255,255,255,0.7);
  text-transform:uppercase;
  letter-spacing:0.05vw;
  text-shadow:0 0.05vw 0.1vw rgba(0,0,0,0.8);
}
#strip-left{
  color:#fff;
  text-shadow:0 0 0.4vw rgba(255,255,255,0.2);
}
#strip-right{
  color:#ffae00; /* Gold venue accent to pop */
  text-shadow:0 0 0.4vw rgba(255,174,0,0.2);
}
</style>
</head>
<body>
<div id="bug">

  <!-- ① TOP BAR (segmented team backgrounds) -->
  <div id="top-bar">
    <div id="hTopBar"></div>
    <div id="ctrTopBar"></div>
    <div id="aTopBar"></div>
  </div>

  <!-- MAIN ROW -->
  <div id="row">

    <!-- ① HOME LOGO -->
    <div class="logo-wrapper" id="hLogoWrapper">
      <div class="logo-cell" id="hLogoCell">
        <div class="circle" id="hCircle"><div class="no-logo">LOGO</div></div>
      </div>
    </div>

    <!-- ② HOME BRACE — Broadcast Divider & Notched Line -->
    <div class="brace-col" id="hBraceCol">
      <svg class="brace-svg" viewBox="0 0 16 42">
        <line x1="14" y1="0" x2="14" y2="42" stroke="currentColor" stroke-opacity="0.25" stroke-width="1.2" />
        <path d="M 9,6 L 9,18 L 4,21 L 9,24 L 9,36" fill="none" stroke="currentColor" stroke-opacity="0.7" stroke-width="1.5" stroke-linecap="square" />
        <text x="8" y="13" font-family="'Barlow Condensed', sans-serif" font-size="8.5" font-weight="900" fill="currentColor" text-anchor="end" id="hFouls"></text>
      </svg>
    </div>

    <!-- ③ HOME SCORE  (dark) -->
    <div class="score-seg" id="hScoreSeg">
      <span class="score-num" id="hNum">0</span>
    </div>

    <!-- ④ CENTER -->
    <div id="ctr">
      <img id="hcLogo" src="/hoop-culture-logo.png" alt="HC">
      <div id="clk">10:00</div>
      <div id="prow">
        <span id="per">1ST</span>
        <span id="sc">24</span>
        <span id="qf"></span>
      </div>
    </div>

    <!-- ⑤ AWAY SCORE  (bright team color) -->
    <div class="score-seg" id="aScoreSeg">
      <span class="score-num" id="aNum">0</span>
    </div>

    <!-- ⑥ AWAY BRACE — Broadcast Divider & Notched Line -->
    <div class="brace-col" id="aBraceCol">
      <svg class="brace-svg" viewBox="0 0 16 42">
        <line x1="2" y1="0" x2="2" y2="42" stroke="currentColor" stroke-opacity="0.25" stroke-width="1.2" />
        <path d="M 7,6 L 7,18 L 12,21 L 7,24 L 7,36" fill="none" stroke="currentColor" stroke-opacity="0.7" stroke-width="1.5" stroke-linecap="square" />
        <text x="8" y="13" font-family="'Barlow Condensed', sans-serif" font-size="8.5" font-weight="900" fill="currentColor" text-anchor="start" id="aFouls"></text>
      </svg>
    </div>

    <!-- ⑦ AWAY LOGO -->
    <div class="logo-wrapper" id="aLogoWrapper">
      <div class="logo-cell" id="aLogoCell">
        <div class="circle" id="aCircle"><div class="no-logo">LOGO</div></div>
      </div>
    </div>

  </div><!-- /row -->

  <!-- BOTTOM STRIP — Clean Centered Broadcast Info -->
  <div id="strip">
    <div id="strip-left" class="strip-text">HOOP CULTURE NETWORK</div>
    <div id="strip-right" class="strip-text"></div>
  </div>

</div>

<script>
/* ══ CONFIG ══ */
const SRV=(window.location.hostname.includes('vercel.app')||window.location.hostname.includes('vercel.sh'))?'https://basketball-scoreboard-o0c7.onrender.com':'';
const useFB=window.location.hostname.includes('vercel.app')||window.location.hostname.includes('vercel.sh');
let db=null;
if(useFB&&typeof firebase!=='undefined'&&isFirebaseConfigured){try{if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);db=firebase.database();}catch(e){}}
const UP=new URLSearchParams(window.location.search);
const CU=UP.get('user')||localStorage.getItem('hc_session_user')||'default';
const FU=CU.replace(/[\.#$\[\]]/g,'_');
let _ll=0,_lb=0;
const bc=new BroadcastChannel('hc_scoreboard_sync');
bc.onmessage=e=>{const m=e.data;if(!m||m.user!==FU)return;_ll=Date.now();if(m.type==='state'){stop();S={...S,...m.data};draw();sync();}else if(m.type==='buzz'&&m.timestamp>_lb){_lb=m.timestamp;m.kind==='game'?gbuzz():sbuzz();}};

/* ══ STATE ══ */
const DEF={
  homeScore:0,awayScore:0,homeFouls:0,awayFouls:0,
  homeBonus:false,awayBonus:false,
  homeAbbr:'HOME',homeColor:'#888888',homeLogo:null,
  awayAbbr:'AWAY',awayColor:'#c8102e',awayLogo:null,
  quarter:1,gameSeconds:600,shotSeconds:24,
  gameRunning:false,shotRunning:false,
  possession:null,
  rp1Title:'',rp1Value:'',rp2Title:'',rp2Value:'',
};
const PER=['1ST','2ND','3RD','4TH','OT','2OT'];
let S={...DEF},lH=-1,lA=-1;

/* ══ TICK ══ */
let tick=null;
function start(){if(tick)return;tick=setInterval(()=>{if(S.gameRunning&&S.gameSeconds>0){S.gameSeconds--;tock();}if(S.shotRunning&&S.shotSeconds>0){S.shotSeconds--;tock();}},1000);}
function stop(){clearInterval(tick);tick=null;}
function sync(){(S.gameRunning||S.shotRunning)?start():stop();}

/* ══ HELPERS ══ */
const $=id=>document.getElementById(id);
function tx(id,v){const e=$(id);if(e)e.textContent=v;}
function isHex(h){return h&&typeof h==='string'&&/^#[0-9a-fA-F]{6}/.test(h);}
function dk(h,p){
  if(!isHex(h))return '#1a1a1a';
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return`rgb(${Math.round(r*p)},${Math.round(g*p)},${Math.round(b*p)})`;
}
function lt(h,p){
  if(!isHex(h))return '#ffffff';
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return`rgb(${Math.round(r+(255-r)*p)},${Math.round(g+(255-g)*p)},${Math.round(b+(255-b)*p)})`;
}
function isLight(h){
  if(!isHex(h))return false;
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return(r*.299+g*.587+b*.114)>150;
}
function setLogo(cid,url){
  const c=$(cid);if(!c)return;
  c.innerHTML=url?`<img src="${url}" alt="" style="width:100%;height:100%;object-fit:contain">`:'<div class="no-logo">LOGO</div>';
}
function setStacked(id,text){
  const el=$(id);if(!el)return;
  const cleanText=(text||'').trim();
  const chars=cleanText.toUpperCase().split('');
  const len=chars.length;
  
  // Dynamic sizing to fit all characters inside the 4.2vw tall capsule end
  let fontSize='0.95vw';
  let lineHeight='0.82vw';
  
  if(len>8){
    fontSize='0.36vw';
    lineHeight='0.3vw';
  }else if(len>6){
    fontSize='0.5vw';
    lineHeight='0.43vw';
  }else if(len>4){
    fontSize='0.68vw';
    lineHeight='0.58vw';
  }else if(len===4){
    fontSize='0.82vw';
    lineHeight='0.7vw';
  }
  
  el.style.fontSize=fontSize;
  el.style.lineHeight=lineHeight;
  el.innerHTML=chars.map(c=>`<span>${c}</span>`).join('');
}

/* ══ CLOCK ══ */
function tock(){
  const s=S.gameSeconds,m=Math.floor(s/60),sec=s%60;
  const v=s<60?`${s}.0`:`${m}:${sec.toString().padStart(2,'0')}`;
  const e=$('clk');if(e){e.textContent=v;e.className=s<=30?'warn':'';}
  const sc=$('sc');if(sc){sc.textContent=S.shotSeconds;sc.className=S.shotSeconds<=5?'warn':'';}
}

/* ══ DRAW ══ */
function draw(){
  /* period */
  tx('per',typeof S.quarter==='number'?(PER[S.quarter-1]||`Q${S.quarter}`):S.quarter);
  tock();

  /* scores + bump */
  const hE=$('hNum'),aE=$('aNum');
  if(hE&&parseInt(hE.textContent)!==S.homeScore){hE.textContent=S.homeScore;if(lH>=0){hE.classList.remove('bump');void hE.offsetWidth;hE.classList.add('bump');}}
  if(aE&&parseInt(aE.textContent)!==S.awayScore){aE.textContent=S.awayScore;if(lA>=0){aE.classList.remove('bump');void aE.offsetWidth;aE.classList.add('bump');}}
  lH=S.homeScore;lA=S.awayScore;

  /* abbr — max 4 chars stacked vertically */
  setStacked('hAbbr', S.homeAbbr || 'HOME');
  setStacked('aAbbr', S.awayAbbr || 'AWAY');

  /* fouls in brace columns */
  const hf=S.homeFouls||0,af=S.awayFouls||0;
  tx('hFouls',hf>0?String(hf):'');
  tx('aFouls',af>0?String(af):'');

  /* shot clock fouls */
  const qfn=parseInt(S.rp1Value||'');
  tx('qf',(!isNaN(qfn)&&qfn>0)?String(qfn):'');

  /* ── COLORS ──
     Dynamically calculate logo and cell colors based on controlboard inputs
  */
  const DARK = '#2d2d2d';
  const hcRaw = isHex(S.homeColor) ? S.homeColor : '#888888';
  const acRaw = isHex(S.awayColor) ? S.awayColor : '#c8102e';

  // Home Colors: logo cell and score block are the picked team color
  const homeCellColor = hcRaw;
  const homePrimary = hcRaw; // Home score segment and brace column is the team color

  // Away Colors: logo cell is the picked color, circle background is the white shade of the logo color
  const awayCellColor = acRaw;
  const awayPrimary = acRaw; // Away score segment and brace column is the team color

  // Determine text and line contrast colors
  const hTextColor = isLight(homePrimary) ? '#111111' : '#ffffff';
  const aTextColor = isLight(awayPrimary) ? '#111111' : '#ffffff';

  /* home logo wrapper background (secondary color/different shade in corners) */
  const hLW=$('hLogoWrapper');
  if(hLW)hLW.style.background=dk(hcRaw, 0.58);

  /* home top bar background (same color shade as corners) */
  const hTB=$('hTopBar');
  if(hTB)hTB.style.background=dk(hcRaw, 0.58);

  /* home logo cell background (primary picked color) */
  const hLC=$('hLogoCell');
  if(hLC)hLC.style.background=homeCellColor;

  /* home circle background (white shade gradient of the team logo color) */
  const hC=$('hCircle');
  if(hC){
    hC.style.background=`radial-gradient(circle at 40% 35%, #ffffff, ${lt(hcRaw, 0.78)})`;
  }

  /* home brace + score block (primary color and text/line color) */
  const hBrace = $('hBraceCol');
  if(hBrace){
    hBrace.style.background=homePrimary;
    hBrace.style.color=hTextColor;
  }
  const hScore = $('hScoreSeg');
  if(hScore){
    hScore.style.background=homePrimary;
    hScore.style.color=hTextColor;
  }

  /* away logo wrapper background (secondary color/different shade in corners) */
  const aLW=$('aLogoWrapper');
  if(aLW)aLW.style.background=dk(acRaw, 0.58);

  /* away top bar background (same color shade as corners) */
  const aTB=$('aTopBar');
  if(aTB)aTB.style.background=dk(acRaw, 0.58);

  /* away logo cell background (primary picked color) */
  const aLC=$('aLogoCell');
  if(aLC)aLC.style.background=awayCellColor;

  /* away circle background (white shade gradient of the team logo color) */
  const aC=$('aCircle');
  if(aC){
    aC.style.background=`radial-gradient(circle at 40% 35%, #ffffff, ${lt(acRaw, 0.78)})`;
  }

  /* away score block + brace (primary color and text/line color) */
  const aBrace = $('aBraceCol');
  if(aBrace){
    aBrace.style.background=awayPrimary;
    aBrace.style.color=aTextColor;
  }
  const aScore = $('aScoreSeg');
  if(aScore){
    aScore.style.background=awayPrimary;
    aScore.style.color=aTextColor;
  }

  /* logos */
  setLogo('hCircle',S.homeLogo || S.homeLogoThumb);
  setLogo('aCircle',S.awayLogo || S.awayLogoThumb);

  /* ── BOTTOM STRIP ──
     Dynamic display of Broadcast (rp1Value) & Venue (rp2Value) from controlboard
  */
  const bcLabel = (S.rp1Title || 'BROADCAST').trim();
  const bcVal = (S.rp1Value || '').trim();
  const vnLabel = (S.rp2Title || 'VENUE').trim();
  const vnVal = (S.rp2Value || '').trim();

  // Filter out empty or none values like '—'
  const cleanBc = (bcVal === '—' || bcVal === '-') ? '' : bcVal;
  const cleanVn = (vnVal === '—' || vnVal === '-') ? '' : vnVal;

  if (cleanBc) {
    tx('strip-left', `${bcLabel}: ${cleanBc}`);
  } else {
    tx('strip-left', 'HOOP CULTURE NETWORK');
  }

  if (cleanVn) {
    tx('strip-right', `${vnLabel}: ${cleanVn}`);
  } else {
    tx('strip-right', '');
  }
}

/* ══ AUDIO ══ */
window.addEventListener('load',()=>{const a=new Audio('/buzzer.mp3');a.volume=0;a.play().then(()=>{a.pause();a.currentTime=0;}).catch(()=>{});});
function gbuzz(){new Audio('/buzzer.mp3').play().catch(()=>{});}
function sbuzz(){new Audio('/buzzer.mp3').play().catch(()=>{});}

/* ══ CONNECT ══ */
function conn(){
  if(useFB&&db){
    db.ref(`states/${FU}`).on('value',sn=>{if(Date.now()-_ll<2000)return;const d=sn.val();if(!d)return;stop();S={...DEF,...d};draw();sync();});
    db.ref(`buzz/${FU}`).on('value',sn=>{if(Date.now()-_ll<2000)return;const m=sn.val();if(!m||m.timestamp<=_lb)return;_lb=m.timestamp;m.kind==='game'?gbuzz():sbuzz();});
    return;
  }
  const es=new EventSource(`${SRV}/events?user=${encodeURIComponent(CU)}`);
  es.onmessage=e=>{try{const m=JSON.parse(e.data);if(Date.now()-_ll<2000)return;if(m.type==='buzz'){m.kind==='game'?gbuzz():sbuzz();}else if(m.type==='state'){stop();S={...DEF,...m.data};draw();sync();}}catch(err){}};
  es.onerror=()=>{es.close();setTimeout(conn,2000);};
}
if(useFB&&db){db.ref(`states/${FU}`).once('value').then(sn=>{const d=sn.val();if(d){S={...DEF,...d};draw();sync();}}).catch(()=>{}).finally(()=>conn());}
else{fetch(`${SRV}/state?user=${encodeURIComponent(CU)}`).then(r=>r.json()).then(d=>{if(Object.keys(d).length){S={...DEF,...d};draw();sync();}}).catch(()=>{}).finally(()=>conn());}
</script>
</body>
</html>

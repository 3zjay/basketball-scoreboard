  <script>
    // Global Storage Shield — prevents WebKit SecurityError exceptions on blocked localStorage/sessionStorage
    (function() {
      try {
        localStorage.setItem('__test_ls__', '1');
        localStorage.removeItem('__test_ls__');
      } catch (e) {
        console.warn("localStorage is blocked. Injecting in-memory fallback.");
        var store = {};
        Object.defineProperty(window, 'localStorage', {
          value: {
            getItem: function(k) { return store[k] === undefined ? null : store[k]; },
            setItem: function(k, v) { store[k] = String(v); },
            removeItem: function(k) { delete store[k]; },
            clear: function() { store = {}; },
            key: function(i) { return Object.keys(store)[i] || null; },
            get length() { return Object.keys(store).length; }
          },
          configurable: true, writable: true
        });
      }
      try {
        sessionStorage.setItem('__test_ss__', '1');
        sessionStorage.removeItem('__test_ss__');
      } catch (e) {
        console.warn("sessionStorage is blocked. Injecting in-memory fallback.");
        var store = {};
        Object.defineProperty(window, 'sessionStorage', {
          value: {
            getItem: function(k) { return store[k] === undefined ? null : store[k]; },
            setItem: function(k, v) { store[k] = String(v); },
            removeItem: function(k) { delete store[k]; },
            clear: function() { store = {}; },
            key: function(i) { return Object.keys(store)[i] || null; },
            get length() { return Object.keys(store).length; }
          },
          configurable: true, writable: true
        });
      }
    })();
  </script>
  <meta charset="UTF-8">
  <title>NBA – NBC Style Scorebug</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,900&family=Barlow:wght@600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --navy:   #0a1224;
      --navy2:  #111d38;
      --navy3:  #18284c;
      --gold:   #f2c94c;
      --gold2:  #f2994a;
      --gold-g: linear-gradient(180deg, #ffe885 0%, #f2c94c 50%, #d49a18 100%);
      --red-g:  linear-gradient(180deg, #ff4b4b 0%, #dc2626 50%, #991b1b 100%);
      --white:  #ffffff;
      --shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: transparent;
      font-family: 'Barlow Condensed', sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      padding-bottom: 2.5vh;
    }

    /* ══ MAIN BUG CONTAINER ══ */
    #bug {
      display: flex;
      flex-direction: column;
      align-items: center;
      filter: drop-shadow(0 12px 24px rgba(0,0,0,0.7));
      transform-origin: bottom center;
    }

    /* ── TOP DECORATIVE STRIP (3-segment top bar) ── */
    #top-bar {
      display: flex;
      width: 100%;
      height: 4px;
      overflow: hidden;
      border-radius: 4px 4px 0 0;
    }
    #hTopBar { width: 44.5%; background: #2d2d2d; transition: background 0.4s; }
    #ctrTopBar { width: 11%; background: #111111; }
    #aTopBar { width: 44.5%; background: #c8102e; transition: background 0.4s; }

    /* ── MAIN SCOREBOARD ROW ── */
    #row {
      display: flex;
      align-items: center;
      height: 4.2vw;
      background: #111111;
      border-radius: 0 0 10px 10px;
      overflow: hidden;
      position: relative;
    }

    /* ① & ⑦ LOGO BLOCK (Capsule Ends) */
    .logo-wrapper {
      position: relative;
      height: 100%;
      display: flex;
      align-items: center;
      background: #2d2d2d;
      padding: 0 0.4vw;
      transition: background 0.4s;
    }

    #hLogoWrapper {
      border-radius: 0 0 0 10px;
    }
    #aLogoWrapper {
      border-radius: 0 0 10px 0;
    }

    .logo-cell {
      width: 3.5vw;
      height: 3.5vw;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Circle badge inside the cell */
    .circle {
      width: 3.2vw;
      height: 3.2vw;
      border-radius: 50%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4), inset 0 0 0 1.5px rgba(255,255,255,0.8);
      overflow: hidden;
      padding: 0.25vw;
    }
    .circle img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .no-logo {
      font-size: 0.8vw;
      font-weight: 900;
      color: #111;
      letter-spacing: 0.5px;
    }

    /* Stacked Team Name Typography */
    .team-abbr-stacked {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 0.82vw;
      font-size: 0.95vw;
      color: #ffffff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
      padding: 0 0.2vw;
    }

    /* ② & ⑥ BRACE / DIVIDER COLUMNS (With Foul Numbers) */
    .brace-col {
      width: 1.4vw;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2d2d2d;
      color: rgba(255,255,255,0.9);
      position: relative;
    }
    .brace-svg {
      width: 100%;
      height: 100%;
    }

    /* ③ & ⑤ SCORE SEGMENTS */
    .score-seg {
      width: 5.2vw;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2d2d2d;
      position: relative;
      transition: background 0.4s;
    }
    .score-num {
      font-size: 2.8vw;
      font-weight: 900;
      color: #ffffff;
      letter-spacing: -1px;
      line-height: 1;
      font-style: italic;
      text-shadow: 0 2px 6px rgba(0,0,0,0.6);
      transition: transform 0.15s ease-out, opacity 0.2s ease;
    }
    .score-num.bump {
      transform: scale(1.25);
      color: #ffe885;
    }

    /* ④ CENTER CLOCK & PERIOD PANEL */
    #ctr {
      width: 9.5vw;
      height: 100%;
      background: #0d0d0d;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-left: 1px solid rgba(255,255,255,0.1);
      border-right: 1px solid rgba(255,255,255,0.1);
      position: relative;
      z-index: 5;
      padding: 0.2vw 0;
    }

    #hcLogo {
      height: 1.0vw;
      width: auto;
      object-fit: contain;
      margin-bottom: 0.1vw;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.8));
    }

    #clk {
      font-size: 1.55vw;
      font-weight: 900;
      color: #ffffff;
      line-height: 0.9;
      letter-spacing: 0.5px;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 2px 4px rgba(0,0,0,0.8);
      transition: opacity 0.2s ease;
    }
    #clk.warn { color: #ff4b4b; animation: pulseClk 1s infinite; }

    #prow {
      display: flex;
      align-items: center;
      gap: 0.4vw;
      margin-top: 0.15vw;
      position: relative;
    }

    #per {
      font-size: 0.8vw;
      font-weight: 900;
      color: #ffe885;
      letter-spacing: 0.5px;
      transition: opacity 0.2s ease;
    }

    #sc {
      font-size: 0.8vw;
      font-weight: 900;
      color: #ffffff;
      background: rgba(255,255,255,0.15);
      padding: 0 0.3vw;
      border-radius: 3px;
      transition: opacity 0.2s ease;
    }
    #sc.warn { color: #ff4b4b; background: rgba(255,75,75,0.25); }

    #qf {
      font-size: 0.75vw;
      font-weight: 900;
      color: #ff4b4b;
    }

    /* ── BOTTOM INFORMATION STRIP ── */
    #strip {
      width: 100%;
      height: 1.15vw;
      background: #000000;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0 0 8px 8px;
      border-top: 1px solid rgba(255,255,255,0.08);
    }
    .strip-text {
      font-size: 0.62vw;
      font-weight: 900;
      color: #a0a0a0;
      letter-spacing: 1px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.4vw;
    }
    .live-dot {
      width: 0.4vw;
      height: 0.4vw;
      background: #ff4b4b;
      border-radius: 50%;
      box-shadow: 0 0 6px #ff4b4b;
    }
    .venue-highlight {
      color: #ffe885;
    }

    /* Absolutely Positioned Stream Image Layer */
    .stream-layer {
      position: absolute;
      inset: 0;
      margin: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 2px rgba(255,255,255,0.9)) drop-shadow(0 0 4px rgba(0,0,0,0.8));
      mix-blend-mode: screen;
      pointer-events: none;
    }
  </style>
</head>
<body>

<div id="bug">

  <!-- ① TOP BAR (segmented team backgrounds) -->
  <div id="top-bar">
    <div id="hTopBar"></div>
    <div id="ctrTopBar"></div>
    <div id="aTopBar"></div>
  </div>

  <!-- MAIN ROW -->
  <div id="row">

    <!-- ① HOME LOGO -->
    <div class="logo-wrapper" id="hLogoWrapper">
      <div class="logo-cell" id="hLogoCell">
        <div class="circle" id="hCircle"><div class="no-logo">LOGO</div></div>
      </div>
      <div class="team-abbr-stacked" id="hAbbr">HOME</div>
    </div>

    <!-- ② HOME BRACE — Broadcast Divider & Notched Line -->
    <div class="brace-col" id="hBraceCol">
      <svg class="brace-svg" viewBox="0 0 16 42">
        <line x1="14" y1="0" x2="14" y2="42" stroke="currentColor" stroke-opacity="0.25" stroke-width="1.2" />
        <path d="M 9,6 L 9,18 L 4,21 L 9,24 L 9,36" fill="none" stroke="currentColor" stroke-opacity="0.7" stroke-width="1.5" stroke-linecap="square" />
        <text x="8" y="13" font-family="'Barlow Condensed', sans-serif" font-size="8.5" font-weight="900" fill="currentColor" text-anchor="end" id="hFouls"></text>

    <!-- ④ CENTER -->
    <div id="ctr">
      <img id="hcLogo" src="/hoop-culture-logo.png" alt="HC">

      <div id="prow">

    <!-- ⑥ AWAY BRACE — Broadcast Divider & Notched Line -->
    <div class="brace-col" id="aBraceCol">
      <svg class="brace-svg" viewBox="0 0 16 42">
        <line x1="2" y1="0" x2="2" y2="42" stroke="currentColor" stroke-opacity="0.25" stroke-width="1.2" />
        <path d="M 7,6 L 7,18 L 12,21 L 7,24 L 7,36" fill="none" stroke="currentColor" stroke-opacity="0.7" stroke-width="1.5" stroke-linecap="square" />
        <text x="8" y="13" font-family="'Barlow Condensed', sans-serif" font-size="8.5" font-weight="900" fill="currentColor" text-anchor="start" id="aFouls"></text>
      </svg>

    <!-- ⑦ AWAY LOGO -->

        <div class="circle" id="aCircle"><div class="no-logo">LOGO</div></div>

  </div><!-- /row -->

  <!-- BOTTOM STRIP — Clean Centered Broadcast Info -->
  <div id="strip">
    <div id="strip-content" class="strip-text">
      <span id="live-dot" class="live-dot" style="display:none;"></span>
      <span id="strip-text">HOOP CULTURE NETWORK</span>
    </div>

</div>

<script>
/* ══ CONFIG ══ */
const SRV=(window.location.hostname.includes('vercel.app')||window.location.hostname.includes('vercel.sh'))?'https://basketball-scoreboard-o0c7.onrender.com':(window.location.protocol==='file:'?'http://localhost:3000':'');
const useFB=window.location.hostname.includes('vercel.app')||window.location.hostname.includes('vercel.sh');

let db=null;
if(useFB&&typeof isFirebaseConfigured!=='undefined'&&isFirebaseConfigured){
  firebase.initializeApp(firebaseConfig);
  db=firebase.database();
}

function gP(n){return new URLSearchParams(window.location.search).get(n);}
const CU=gP('user')||'default';
const FU=CU.replace(/[\.\#\$\[\]]/g,'_');

const PER=['1ST','2ND','3RD','4TH','OT','2OT','3OT'];

const DEF={
  homeScore:0,awayScore:0,
  homeAbbr:'HOME',awayAbbr:'AWAY',
  homeColor:'#888888',awayColor:'#c8102e',
  homeLogo:'',awayLogo:'',
  homeLogoThumb:'',awayLogoThumb:'',
  homeFouls:0,awayFouls:0,
  gameSeconds:600,clockRunning:false,
  shotSeconds:24,shotRunning:false,
  quarter:1,
  rp1Title:'BROADCAST',rp1Value:'',
  rp2Title:'VENUE',rp2Value:'',
  aiSyncEnabled:true,
  gameClockStream:null,shotClockStream:null,
  homeScoreStream:null,awayScoreStream:null,periodStream:null
};

let S={...DEF};
let lH=-1,lA=-1,_lb=0;
let _lastLocalMsgTime=0;
let _ll=0;

const bc=typeof BroadcastChannel!=='undefined'?new BroadcastChannel('basketball_scoreboard'):null;
if(bc){
  bc.onmessage=e=>{
    if(e.data){
      if(e.data.type==='state'){
        _lastLocalMsgTime=Date.now();
        _ll=Date.now();
        stop();
        S={...DEF,...e.data.data};
        draw();
        sync();
      }else if(e.data.type==='stream'){
        S={...S,...e.data.data};
        draw();
      }
    }
  };
}

function $(i){return document.getElementById(i);}
function tx(i,v){const e=$(i);if(e)e.textContent=v;}
function isHex(c){return/^#[0-9A-F]{6}$/i.test(c);}

function isValidStream(url) {
  return typeof url === 'string' && url.length > 50 && url.startsWith('data:image/');
}

/* Hex Darkener Helper */
function dk(hex, factor) {
  if (!isHex(hex)) return '#2d2d2d';
  let r = parseInt(hex.slice(1,3), 16);
  let g = parseInt(hex.slice(3,5), 16);
  let b = parseInt(hex.slice(5,7), 16);
  r = Math.floor(r * factor);
  g = Math.floor(g * factor);
  b = Math.floor(b * factor);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

/* Light/Dark Luminance Helper */
function isLight(hex) {
  if (!isHex(hex)) return false;
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  const lum = (0.299 * r + 0.587 * g + 0.114 * b);
  return lum > 160;
}

function setLogo(cid,url){
  const c=$(cid);if(!c)return;
  c.innerHTML=url?`<img src="${url}" alt="" style="width:100%;height:100%;object-fit:contain">`:'<div class="no-logo">LOGO</div>';
}
function setStacked(id,text){
  const el=$(id);if(!el)return;
  const cleanText=(text||'').trim();
  const chars=cleanText.toUpperCase().split('');
  const len=chars.length;
  
  let fontSize='0.95vw';
  let lineHeight='0.82vw';
  
  if(len>8){
    fontSize='0.36vw';
    lineHeight='0.3vw';
  }else if(len>6){
    fontSize='0.5vw';
    lineHeight='0.43vw';
  }else if(len>4){
    fontSize='0.68vw';
    lineHeight='0.58vw';
  }else if(len===4){
    fontSize='0.82vw';
    lineHeight='0.7vw';
  }
  
  el.style.fontSize=fontSize;
  el.style.lineHeight=lineHeight;
  el.innerHTML=chars.map(c=>`<span>${c}</span>`).join('');
}

/* ══ CLOCK ══ */
function tock(){
  const s=S.gameSeconds,m=Math.floor(s/60),sec=s%60;
  const v=s<60?`${s}.0`:`${m}:${sec.toString().padStart(2,'0')}`;
  const e=$('clk');if(e){e.textContent=v;e.className=s<=30?'warn':'';}
  const sc=$('sc');if(sc){sc.textContent=S.shotSeconds;sc.className=S.shotSeconds<=5?'warn':'';}
}

/* ══ DRAW ══ */
function draw(){
  /* period */
  tx('per',typeof S.quarter==='number'?(PER[S.quarter-1]||`Q${S.quarter}`):S.quarter);
  tock();

  /* scores + bump */
  const hE=$('hNum'),aE=$('aNum');
  if(hE&&parseInt(hE.textContent)!==S.homeScore){hE.textContent=S.homeScore;if(lH>=0){hE.classList.remove('bump');void hE.offsetWidth;hE.classList.add('bump');}}
  if(aE&&parseInt(aE.textContent)!==S.awayScore){aE.textContent=S.awayScore;if(lA>=0){aE.classList.remove('bump');void aE.offsetWidth;aE.classList.add('bump');}}
  lH=S.homeScore;lA=S.awayScore;

  /* Optical Camera Stream Crops vs Digital Fallback */
  const isAiOn = S.aiSyncEnabled !== false;

  // Home Score Stream
  const hImg = $('homeScoreStreamImg');
  if (hImg && hE) {
    if (isAiOn && isValidStream(S.homeScoreStream)) {
      if (hImg.src !== S.homeScoreStream) hImg.src = S.homeScoreStream;
      hImg.style.display = 'block';
      hE.style.opacity = '0';
    } else {
      hImg.style.display = 'none';
      hE.style.opacity = '1';
    }
  }

  // Away Score Stream
  const aImg = $('awayScoreStreamImg');
  if (aImg && aE) {
    if (isAiOn && isValidStream(S.awayScoreStream)) {
      if (aImg.src !== S.awayScoreStream) aImg.src = S.awayScoreStream;
      aImg.style.display = 'block';
      aE.style.opacity = '0';
    } else {
      aImg.style.display = 'none';
      aE.style.opacity = '1';
    }
  }

  // Game Clock Stream
  const cImg = $('gameClockStreamImg'), cClk = $('clk');
  if (cImg && cClk) {
    if (isAiOn && isValidStream(S.gameClockStream)) {
      if (cImg.src !== S.gameClockStream) cImg.src = S.gameClockStream;
      cImg.style.display = 'block';
      cClk.style.opacity = '0';
    } else {
      cImg.style.display = 'none';
      cClk.style.opacity = '1';
    }
  }

  // Period Stream
  const pImg = $('periodStreamImg'), pPer = $('per');
  if (pImg && pPer) {
    if (isAiOn && isValidStream(S.periodStream)) {
      if (pImg.src !== S.periodStream) pImg.src = S.periodStream;
      pImg.style.display = 'block';
      pPer.style.opacity = '0';
    } else {
      pImg.style.display = 'none';
      pPer.style.opacity = '1';
    }
  }

  // Shot Clock Stream
  const sImg = $('shotClockStreamImg'), sSc = $('sc');
  if (sImg && sSc) {
    if (isAiOn && isValidStream(S.shotClockStream)) {
      if (sImg.src !== S.shotClockStream) sImg.src = S.shotClockStream;
      sImg.style.display = 'block';
      sSc.style.opacity = '0';
    } else {
      sImg.style.display = 'none';
      sSc.style.opacity = '1';
    }
  }

  /* abbr — max 4 chars stacked vertically */
  setStacked('hAbbr', S.homeAbbr || 'HOME');
  setStacked('aAbbr', S.awayAbbr || 'AWAY');

  /* fouls in brace columns */
  const hf=S.homeFouls||0,af=S.awayFouls||0;
  tx('hFouls',hf>0?String(hf):'');
  tx('aFouls',af>0?String(af):'');

  /* shot clock fouls */
  const qfn=parseInt(S.rp1Value||'');
  tx('qf',(!isNaN(qfn)&&qfn>0)?String(qfn):'');

  /* ── COLORS ── */
  const hcRaw = isHex(S.homeColor) ? S.homeColor : '#888888';
  const acRaw = isHex(S.awayColor) ? S.awayColor : '#c8102e';

  const homePrimary = hcRaw;
  const awayPrimary = acRaw;

  const hTextColor = isLight(homePrimary) ? '#111111' : '#ffffff';
  const aTextColor = isLight(awayPrimary) ? '#111111' : '#ffffff';

  const hLW=$('hLogoWrapper');
  if(hLW)hLW.style.background=dk(hcRaw, 0.58);

  const hTB=$('hTopBar');
  if(hTB)hTB.style.background=dk(hcRaw, 0.58);

  const aTB=$('aTopBar');
  if(aTB)aTB.style.background=dk(acRaw, 0.58);

  const aLW=$('aLogoWrapper');
  if(aLW)aLW.style.background=dk(acRaw, 0.58);

  const hBrace = $('hBraceCol');
  if(hBrace){
    hBrace.style.background=homePrimary;
    hBrace.style.color=hTextColor;
  }
  const hScore = $('hScoreSeg');
  if(hScore){
    hScore.style.background=homePrimary;
    hScore.style.color=hTextColor;
  }

  const aBrace = $('aBraceCol');
  if(aBrace){
    aBrace.style.background=awayPrimary;
    aBrace.style.color=aTextColor;
  }
  const aScore = $('aScoreSeg');
  if(aScore){
    aScore.style.background=awayPrimary;
    aScore.style.color=aTextColor;
  }

  setLogo('hCircle',S.homeLogo || S.homeLogoThumb);
  setLogo('aCircle',S.awayLogo || S.awayLogoThumb);

  const bcVal = (S.rp1Value || '').trim();
  const vnLabel = (S.rp2Title || 'VENUE').trim();
  const vnVal = (S.rp2Value || '').trim();

  const cleanBc = (bcVal === '—' || bcVal === '-') ? '' : bcVal;
  const cleanVn = (vnVal === '—' || vnVal === '-') ? '' : vnVal;

  const dotEl = document.getElementById('live-dot');
  const txtEl = document.getElementById('strip-text');

  if (txtEl) {
    if (cleanBc) {
      if (dotEl) dotEl.style.display = 'inline-block';
      let html = `LIVE: ${cleanBc}`;
      if (cleanVn) {
        html += ` &nbsp;&nbsp;&bull;&nbsp;&nbsp; ${vnLabel}: <span class="venue-highlight">${cleanVn}</span>`;
      }
      txtEl.innerHTML = html;
    } else {
      if (dotEl) dotEl.style.display = 'none';
      if (cleanVn) {
        txtEl.innerHTML = `${vnLabel}: <span class="venue-highlight">${cleanVn}</span>`;
      } else {
        txtEl.textContent = 'HOOP CULTURE NETWORK';
      }
    }
  }
}

/* ══ TIMER & LOCAL TICK ══ */
let tT=null,sT=null;
function sync(){
  clearInterval(tT);clearInterval(sT);
  if(S.clockRunning){tT=setInterval(()=>{if(S.gameSeconds>0){S.gameSeconds--;tock();}else{clearInterval(tT);gbuzz();}},1000);}
  if(S.shotRunning){sT=setInterval(()=>{if(S.shotSeconds>0){S.shotSeconds--;tock();}else{clearInterval(sT);sbuzz();}},1000);}
}
function stop(){clearInterval(tT);clearInterval(sT);}

/* ══ AUDIO ══ */
const _gameBuzzer = new Audio('/buzzer.mp3');
_gameBuzzer.volume = 1.0;
_gameBuzzer.load();

const _shotBuzzer = new Audio('/buzzer.mp3');
_shotBuzzer.volume = 1.0;
_shotBuzzer.load();

window.addEventListener('load', () => {
  [_gameBuzzer, _shotBuzzer].forEach(a => {
    a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {});
  });
});

function gbuzz(){ _gameBuzzer.currentTime = 0; _gameBuzzer.play().catch(()=>{}); }
function sbuzz(){ _shotBuzzer.currentTime = 0; _shotBuzzer.play().catch(()=>{}); }

/* ══ CONNECT ══ */
function conn(){
  if(useFB&&db){
    db.ref(`states/${FU}`).on('value',sn=>{if(Date.now()-_ll<2000)return;const d=sn.val();if(!d)return;stop();S={...DEF,...d};draw();sync();});
    db.ref(`ocr/${FU}`).on('value',sn=>{const d=sn.val();if(!d)return;S={...S,...d};draw();});
    db.ref(`buzz/${FU}`).on('value',sn=>{if(Date.now()-_ll<2000)return;const m=sn.val();if(!m||m.timestamp<=_lb)return;_lb=m.timestamp;m.kind==='game'?gbuzz():sbuzz();});
    return;
  }
  const es=new EventSource(`${SRV}/events?user=${encodeURIComponent(CU)}`);
  es.onmessage=e=>{try{const m=JSON.parse(e.data);if(m.type==='buzz'){if(Date.now()-_ll<2000)return;m.kind==='game'?gbuzz():sbuzz();}else if(m.type==='state'){if(Date.now()-_ll<2000)return;stop();S={...DEF,...m.data};draw();sync();}else if(m.type==='stream'){S={...S,...m.data};draw();}}catch(err){}};
  es.onerror=()=>{es.close();setTimeout(conn,2000);};
}
if(useFB&&db){
  db.ref(`states/${FU}`).once('value').then(sn=>{const d=sn.val();if(d){S={...DEF,...d};draw();sync();}}).catch(()=>{}).finally(()=>conn());
  db.ref(`ocr/${FU}`).once('value').then(sn=>{const d=sn.val();if(d){S={...S,...d};draw();}}).catch(()=>{});
}
else{fetch(`${SRV}/state?user=${encodeURIComponent(CU)}`).then(r=>r.json()).then(d=>{if(Object.keys(d).length){S={...DEF,...d};draw();sync();}}).catch(()=>{}).finally(()=>conn());}
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NBA – NBC Style Scorebug</title>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="/firebase-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Teko:wght@700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;overflow:hidden;width:100%;height:100%}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ROOT — fixed bottom-center
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#bug{
  position:fixed;
  bottom:2vw;
  left:50%;
  transform:translateX(-50%);
  display:inline-flex;
  flex-direction:column;
  border-radius:.2vw;
  overflow:hidden;
  box-shadow:0 .3vw 2vw rgba(0,0,0,.9);
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MAIN ROW  — 4.4 vw tall (compact like NBC)
   Layout: [TAB][LOGO][|][SCORE] [CTR] [SCORE][|][LOGO][TAB]
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#row{
  display:flex;
  align-items:stretch;
  height:4.4vw;
}

/* ── TEAM ABBR TAB ── */
.tab{
  width:2.6vw;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  background:#2d2d2d;      /* JS overrides */
}
.tab span{
  font-family:'Barlow Condensed',sans-serif;
  font-size:1.05vw;
  font-weight:900;
  color:#fff;
  text-transform:uppercase;
  letter-spacing:.1vw;
  white-space:nowrap;
  /* top → bottom, same as NBC */
  writing-mode:vertical-lr;
  text-orientation:mixed;
}

/* ── LOGO CELL (square = row height) ── */
.logo-cell{
  width:4.4vw;             /* square */
  flex-shrink:0;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#1e1e1e;       /* JS overrides with tinted team color */
}
.logo-circle{
  width:3.7vw;
  height:3.7vw;
  border-radius:50%;
  overflow:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#0d0d0d;
  flex-shrink:0;
}
.logo-circle img{width:100%;height:100%;object-fit:contain}
.no-logo{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.32vw;font-weight:700;
  color:rgba(255,255,255,.2);text-transform:uppercase;
}
/* foul badge */
.badge{
  position:absolute;
  font-family:'Barlow Condensed',sans-serif;
  font-size:.72vw;font-weight:900;color:#fff;
  background:rgba(0,0,0,.75);
  padding:.03vw .22vw;border-radius:.14vw;
  line-height:1.3;display:none;z-index:5;
}
.badge-home{top:.18vw;right:.18vw}
.badge-away{top:.18vw;left:.18vw}

/* ── SCORE DIVIDER ── */
.div{
  width:2px;flex-shrink:0;
  background:rgba(255,255,255,.22);
  align-self:stretch;
}

/* ── SCORE BLOCK ── */
.score{
  width:5.2vw;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  background:#252525;     /* home: darkened; away: bright team color — both set by JS */
}
.score-num{
  font-family:'Teko',sans-serif;
  font-size:3.2vw;font-weight:700;color:#fff;
  line-height:1;font-variant-numeric:tabular-nums;
}
@keyframes bump{
  0%{transform:scale(1);color:#fff}
  40%{transform:scale(1.2);color:#ffe066}
  100%{transform:scale(1);color:#fff}
}
.bump{animation:bump .38s ease}

/* ── CENTER BLOCK ── */
#ctr{
  width:8.8vw;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:#111;flex-shrink:0;
  border-left:1px solid rgba(255,255,255,.07);
  border-right:1px solid rgba(255,255,255,.07);
  padding:.2vw 0;
  gap:.08vw;
}
#hc-logo{
  width:1.6vw;height:1.6vw;
  object-fit:contain;
  margin-bottom:.04vw;
}
#clk{
  font-family:'Teko',sans-serif;
  font-size:2.35vw;font-weight:700;color:#fff;
  line-height:.92;font-variant-numeric:tabular-nums;
  transition:color .3s;
}
#clk.warn{color:#ff4040}
#period-row{
  display:flex;align-items:baseline;gap:.38vw;
  margin-top:.05vw;
}
#period{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.78vw;font-weight:900;color:#fff;
  letter-spacing:.06vw;text-transform:uppercase;line-height:1;
}
#qfouls{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.78vw;font-weight:900;color:#e82020;
  line-height:1;min-width:.6vw;text-align:center;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   BOTTOM STRIP
   ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#strip{
  display:flex;align-items:center;
  height:1.2vw;
  background:#0a0a0a;
  border-top:1px solid rgba(255,255,255,.05);
}
.bonus{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.47vw;font-weight:800;letter-spacing:.18vw;
  color:rgba(255,255,255,.3);text-transform:uppercase;
  padding:0 .85vw;flex-shrink:0;white-space:nowrap;
  transition:color .3s;
}
.bonus.on{color:#ffe066}
.sep{width:1px;height:50%;background:rgba(255,255,255,.12);flex-shrink:0}
#ticker{
  flex:1;display:flex;align-items:center;justify-content:center;
  gap:.32vw;overflow:hidden;padding:0 .4vw;
}
.ball{
  width:.52vw;height:.52vw;border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 35% 35%,#f85c0a,#a03800);
}
#ticker-txt{
  font-family:'Barlow Condensed',sans-serif;
  font-size:.5vw;font-weight:800;letter-spacing:.2vw;
  color:rgba(255,255,255,.38);text-transform:uppercase;
  white-space:nowrap;font-style:italic;
}
</style>
</head>
<body>
<div id="bug">

  <!-- MAIN ROW -->
  <div id="row">

    <!-- ① HOME TAB -->
    <div class="tab" id="hTab"><span id="hAbbr">HOME</span></div>

    <!-- ② HOME LOGO -->
    <div class="logo-cell" id="hLogoCell">
      <div class="logo-circle" id="hCircle"><div class="no-logo">LOGO</div></div>
      <div class="badge badge-home" id="hBadge"></div>
    </div>

    <!-- ③ DIVIDER -->
    <div class="div"></div>

    <!-- ④ HOME SCORE (dark) -->
    <div class="score" id="hScore"><span class="score-num" id="hNum">0</span></div>

    <!-- ⑤ CENTER -->
    <div id="ctr">
      <img id="hc-logo" src="/hoop-culture-logo.png" alt="HC">
      <div id="clk">10:00</div>
      <div id="period-row">
        <span id="period">1ST</span>
        <span id="qfouls"></span>
      </div>
    </div>

    <!-- ⑥ AWAY SCORE (bright team color) -->
    <div class="score" id="aScore"><span class="score-num" id="aNum">0</span></div>

    <!-- ⑦ DIVIDER -->
    <div class="div"></div>

    <!-- ⑧ AWAY LOGO -->
    <div class="logo-cell" id="aLogoCell">
      <div class="logo-circle" id="aCircle"><div class="no-logo">LOGO</div></div>
      <div class="badge badge-away" id="aBadge"></div>
    </div>

    <!-- ⑨ AWAY TAB -->
    <div class="tab" id="aTab"><span id="aAbbr">AWAY</span></div>

  </div><!-- /row -->

  <!-- BOTTOM STRIP -->
  <div id="strip">
    <span class="bonus" id="hBonus">BONUS</span>
    <div class="sep"></div>
    <div id="ticker">
      <div class="ball"></div>
      <span id="ticker-txt">NBA BASKETBALL</span>
    </div>
    <div class="sep"></div>
    <span class="bonus" id="aBonus">BONUS</span>
  </div>

</div>

<script>
/* ══ FIREBASE / SSE / BROADCAST ══ */
const SERVER_URL=(window.location.hostname.includes('vercel.app')||window.location.hostname.includes('vercel.sh'))?'https://basketball-scoreboard-o0c7.onrender.com':'';
const useFirebase=window.location.hostname.includes('vercel.app')||window.location.hostname.includes('vercel.sh');
let db=null;
if(useFirebase&&typeof firebase!=='undefined'&&isFirebaseConfigured){try{if(!firebase.apps.length)firebase.initializeApp(firebaseConfig);db=firebase.database();}catch(e){}}
const urlParams=new URLSearchParams(window.location.search);
const currentUser=urlParams.get('user')||localStorage.getItem('hc_session_user')||'default';
const fbUser=currentUser.replace(/[\.#$\[\]]/g,'_');

let _lastLocal=0,_lastBuzz=0;
const bc=new BroadcastChannel('hc_scoreboard_sync');
bc.onmessage=e=>{
  const m=e.data;if(!m||m.user!==fbUser)return;
  _lastLocal=Date.now();
  if(m.type==='state'){stop();S={...S,...m.data};draw();sync();}
  else if(m.type==='buzz'&&m.timestamp>_lastBuzz){_lastBuzz=m.timestamp;m.kind==='game'?gameBuzz():shotBuzz();}
};

/* ══ STATE ══ */
const DEF={
  homeScore:0,awayScore:0,homeFouls:0,awayFouls:0,
  homeBonus:false,awayBonus:false,
  homeAbbr:'HOME',homeColor:'#3a3a3a',homeLogo:null,
  awayAbbr:'AWAY',awayColor:'#c8102e',awayLogo:null,
  quarter:1,gameSeconds:600,shotSeconds:24,
  gameRunning:false,shotRunning:false,
  possession:null,rp1Title:'',rp1Value:'',
};
const PER=['1ST','2ND','3RD','4TH','OT','2OT'];
let S={...DEF},lH=-1,lA=-1;

/* ══ TICK ══ */
let tick=null;
function start(){if(tick)return;tick=setInterval(()=>{if(S.gameRunning&&S.gameSeconds>0){S.gameSeconds--;clocks();}if(S.shotRunning&&S.shotSeconds>0){S.shotSeconds--;clocks();}},1000);}
function stop(){clearInterval(tick);tick=null;}
function sync(){(S.gameRunning||S.shotRunning)?start():stop();}

/* ══ HELPERS ══ */
const $=id=>document.getElementById(id);
function tx(id,v){const e=$(id);if(e)e.textContent=v;}
function hex(h){return h&&typeof h==='string'&&/^#[0-9a-fA-F]{6}/.test(h);}
function dk(h,p){
  if(!hex(h))return '#1a1a1a';
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return`rgb(${Math.round(r*p)},${Math.round(g*p)},${Math.round(b*p)})`;
}
function logo(circleId,url){
  const c=$(circleId);if(!c)return;
  c.innerHTML=url?`<img src="${url}" alt="" style="width:100%;height:100%;object-fit:contain">`:'<div class="no-logo">LOGO</div>';
}

/* ══ CLOCK ══ */
function clocks(){
  const s=S.gameSeconds,m=Math.floor(s/60),sec=s%60;
  const v=s<60?`${s}.0`:`${m}:${sec.toString().padStart(2,'0')}`;
  const e=$('clk');if(e){e.textContent=v;e.className=s<=30?'warn':'';}
}

/* ══ DRAW ══ */
function draw(){
  /* period */
  tx('period',typeof S.quarter==='number'?(PER[S.quarter-1]||`Q${S.quarter}`):S.quarter);
  clocks();

  /* scores */
  const hE=$('hNum'),aE=$('aNum');
  if(hE&&parseInt(hE.textContent)!==S.homeScore){hE.textContent=S.homeScore;if(lH>=0){hE.classList.remove('bump');void hE.offsetWidth;hE.classList.add('bump');}}
  if(aE&&parseInt(aE.textContent)!==S.awayScore){aE.textContent=S.awayScore;if(lA>=0){aE.classList.remove('bump');void aE.offsetWidth;aE.classList.add('bump');}}
  lH=S.homeScore;lA=S.awayScore;

  /* abbr — max 4 chars */
  tx('hAbbr',(S.homeAbbr||'HOME').toUpperCase().slice(0,4));
  tx('aAbbr',(S.awayAbbr||'AWAY').toUpperCase().slice(0,4));

  /* foul badges */
  const hf=S.homeFouls||0,af=S.awayFouls||0;
  const hB=$('hBadge'),aB=$('aBadge');
  if(hB){hB.textContent=hf;hB.style.display=hf>0?'block':'none';}
  if(aB){aB.textContent=af;aB.style.display=af>0?'block':'none';}

  /* quarter fouls */
  const qf=parseInt(S.rp1Value||'');
  tx('qfouls',(!isNaN(qf)&&qf>0)?String(qf):'');

  /* bonus */
  $('hBonus').className='bonus'+(S.homeBonus?' on':'');
  $('aBonus').className='bonus'+(S.awayBonus?' on':'');

  /* ticker */
  tx('ticker-txt',(S.rp1Title&&S.rp1Title.trim())?S.rp1Title.trim().toUpperCase():'NBA BASKETBALL');

  /* colors */
  const hc=hex(S.homeColor)?S.homeColor:'#3a3a3a';
  const ac=hex(S.awayColor)?S.awayColor:'#c8102e';

  /* HOME: tab = team color, score = 55% dark, logo cell = 32% dark */
  const hT=$('hTab'),hS=$('hScore'),hL=$('hLogoCell');
  if(hT)hT.style.background=hc;
  if(hS)hS.style.background=dk(hc,.55);
  if(hL)hL.style.background=dk(hc,.32);

  /* AWAY: score = full bright, tab = 60% dark, logo cell = 32% dark */
  const aT=$('aTab'),aS=$('aScore'),aL=$('aLogoCell');
  if(aS)aS.style.background=ac;
  if(aT)aT.style.background=dk(ac,.6);
  if(aL)aL.style.background=dk(ac,.32);

  /* logos */
  logo('hCircle',S.homeLogo);
  logo('aCircle',S.awayLogo);
}

/* ══ AUDIO ══ */
window.addEventListener('load',()=>{const a=new Audio('/buzzer.mp3');a.volume=0;a.play().then(()=>{a.pause();a.currentTime=0;}).catch(()=>{});});
function gameBuzz(){new Audio('/buzzer.mp3').play().catch(()=>{});}
function shotBuzz(){new Audio('/buzzer.mp3').play().catch(()=>{});}

/* ══ CONNECT ══ */
function connect(){
  if(useFirebase&&db){
    db.ref(`states/${fbUser}`).on('value',sn=>{if(Date.now()-_lastLocal<2000)return;const d=sn.val();if(!d)return;stop();S={...DEF,...d};draw();sync();});
    db.ref(`buzz/${fbUser}`).on('value',sn=>{if(Date.now()-_lastLocal<2000)return;const m=sn.val();if(!m||m.timestamp<=_lastBuzz)return;_lastBuzz=m.timestamp;m.kind==='game'?gameBuzz():shotBuzz();});
    return;
  }
  const es=new EventSource(`${SERVER_URL}/events?user=${encodeURIComponent(currentUser)}`);
  es.onmessage=e=>{try{const m=JSON.parse(e.data);if(Date.now()-_lastLocal<2000)return;if(m.type==='buzz'){m.kind==='game'?gameBuzz():shotBuzz();}else if(m.type==='state'){stop();S={...DEF,...m.data};draw();sync();}}catch(err){}};
  es.onerror=()=>{es.close();setTimeout(connect,2000);};
}
if(useFirebase&&db){db.ref(`states/${fbUser}`).once('value').then(sn=>{const d=sn.val();if(d){S={...DEF,...d};draw();sync();}}).catch(()=>{}).finally(()=>connect());}
else{fetch(`${SERVER_URL}/state?user=${encodeURIComponent(currentUser)}`).then(r=>r.json()).then(d=>{if(Object.keys(d).length){S={...DEF,...d};draw();sync();}}).catch(()=>{}).finally(()=>connect());}
</script>
</body>
</html>

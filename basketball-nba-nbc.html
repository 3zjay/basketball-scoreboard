<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NBA – NBC Scorebug</title>
<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="/firebase-config.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Teko:wght@700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html, body {
  background: transparent;
  overflow: hidden;
  width: 100%; height: 100%;
  font-family: 'Barlow Condensed', sans-serif;
}

/* ═══════════════════════════════════════════════
   SCOREBUG ROOT — fixed bottom-center
   ═══════════════════════════════════════════════ */
#scorebug {
  position: fixed;
  bottom: 1.8vw;
  left: 50%;
  transform: translateX(-50%);
  display: inline-flex;
  flex-direction: column;
  box-shadow: 0 0.4vw 2.5vw rgba(0,0,0,0.9);
  /* clip everything inside to border radius */
  border-radius: 0.22vw;
  overflow: hidden;
}

/* ═══════════════════════════════════════════════
   MAIN ROW
   ═══════════════════════════════════════════════ */
.main-row {
  display: flex;
  align-items: stretch;
  height: 5.1vw;
}

/* ─── TEAM ABBR TABS ─── */
.team-tab {
  width: 3.0vw;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  background: #3a3a3a; /* JS overrides this */
}
.tab-abbr {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 1.3vw;
  font-weight: 900;
  color: #fff;
  text-transform: uppercase;
  letter-spacing: 0.08vw;
  line-height: 1;
  /* Both sides read top → bottom */
  writing-mode: vertical-lr;
  text-orientation: mixed;
}

/* ─── LOGO CELLS ─── */
.logo-seg {
  width: 5.1vw;         /* square = row height */
  flex-shrink: 0;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1e1e1e; /* JS overrides with darkened team color */
}
.logo-inner {
  width: 4.4vw;
  height: 4.4vw;
  border-radius: 50%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #111;
}
.logo-inner img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}
.logo-ph {
  font-size: 0.38vw;
  font-weight: 700;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
}

/* Foul/timeout badge */
.logo-badge {
  position: absolute;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.85vw;
  font-weight: 900;
  color: #fff;
  background: rgba(0,0,0,0.72);
  padding: 0.06vw 0.28vw;
  border-radius: 0.18vw;
  line-height: 1.2;
  display: none; /* shown when value > 0 */
  z-index: 5;
}
.home-badge { top: 0.22vw; right: 0.22vw; }
.away-badge { top: 0.22vw; left:  0.22vw; }

/* ─── THIN DIVIDERS between logo and score ─── */
.score-divider {
  width: 2px;
  background: rgba(255,255,255,0.22);
  flex-shrink: 0;
  align-self: stretch;
}

/* ─── SCORE BLOCKS ─── */
.score-seg {
  min-width: 5.0vw;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 0.8vw;
  flex-shrink: 0;
  background: #252525; /* home default: dark neutral | away: JS sets team color */
}
.score-num {
  font-family: 'Teko', sans-serif;
  font-size: 3.7vw;
  font-weight: 700;
  color: #fff;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
@keyframes scoreBump {
  0%   { transform: scale(1);    color: #fff; }
  40%  { transform: scale(1.22); color: #ffe066; }
  100% { transform: scale(1);    color: #fff; }
}
.bump { animation: scoreBump 0.38s ease; }

/* ─── CENTER BLOCK ─── */
.center-seg {
  min-width: 9.2vw;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #141414;
  padding: 0 1.1vw;
  flex-shrink: 0;
  border-left:  1px solid rgba(255,255,255,0.07);
  border-right: 1px solid rgba(255,255,255,0.07);
  gap: 0;
}
/* NBC Peacock SVG */
.nbc-logo {
  width: 2.3vw;
  height: 2.3vw;
  margin-bottom: 0.1vw;
  flex-shrink: 0;
}
.clock-val {
  font-family: 'Teko', sans-serif;
  font-size: 2.5vw;
  font-weight: 700;
  color: #fff;
  line-height: 0.95;
  font-variant-numeric: tabular-nums;
  transition: color 0.3s;
}
.clock-val.warn { color: #ff4040; }
.period-row {
  display: flex;
  align-items: center;
  gap: 0.45vw;
  margin-top: 0.08vw;
}
.period-val {
  font-size: 0.9vw;
  font-weight: 900;
  color: #fff;
  letter-spacing: 0.06vw;
  text-transform: uppercase;
  line-height: 1;
}
.quarter-fouls {
  font-size: 0.9vw;
  font-weight: 900;
  color: #e82828;
  min-width: 0.8vw;
  text-align: center;
  line-height: 1;
}

/* ═══════════════════════════════════════════════
   BOTTOM STRIP
   ═══════════════════════════════════════════════ */
.bottom-strip {
  display: flex;
  align-items: center;
  height: 1.35vw;
  background: #0d0d0d;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.bonus-lbl {
  font-size: 0.52vw;
  font-weight: 800;
  letter-spacing: 0.16vw;
  color: rgba(255,255,255,0.3);
  text-transform: uppercase;
  padding: 0 1.0vw;
  flex-shrink: 0;
  white-space: nowrap;
  transition: color 0.3s;
}
.bonus-lbl.active { color: #ffe066; }
.strip-divider {
  width: 1px;
  height: 55%;
  background: rgba(255,255,255,0.12);
  flex-shrink: 0;
}
.ticker-center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.38vw;
  overflow: hidden;
  padding: 0 0.5vw;
}
.ticker-ball {
  width: 0.6vw;
  height: 0.6vw;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #f85c0a, #b03e00);
  flex-shrink: 0;
}
.ticker-text {
  font-size: 0.58vw;
  font-weight: 800;
  letter-spacing: 0.18vw;
  color: rgba(255,255,255,0.42);
  text-transform: uppercase;
  white-space: nowrap;
  font-style: italic;
}
</style>
</head>
<body>

<div id="scorebug">

  <!-- ══ MAIN ROW ══ -->
  <div class="main-row">

    <!-- HOME ABBR TAB (left edge) -->
    <div class="team-tab" id="homeTab">
      <span class="tab-abbr" id="homeAbbrNBC">HOME</span>
    </div>

    <!-- HOME LOGO CIRCLE -->
    <div class="logo-seg" id="homeLogoSeg">
      <div class="logo-inner" id="homeLogoInner">
        <div class="logo-ph" id="homeLogoNBC">LOGO</div>
      </div>
      <div class="logo-badge home-badge" id="homeBadge"></div>
    </div>

    <!-- DIVIDER -->
    <div class="score-divider"></div>

    <!-- HOME SCORE (dark neutral bg) -->
    <div class="score-seg" id="homeScoreSeg">
      <div class="score-num" id="homeScoreNBC">0</div>
    </div>

    <!-- CENTER: NBC logo · clock · period/fouls -->
    <div class="center-seg">
      <!-- NBC Peacock -->
      <svg class="nbc-logo" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <!-- 6 feather petals radiating from center -->
        <ellipse cx="60" cy="38" rx="7" ry="20" fill="#e8262b"/>
        <ellipse cx="60" cy="38" rx="7" ry="20" fill="#f5a623" transform="rotate(60 60 60)"/>
        <ellipse cx="60" cy="38" rx="7" ry="20" fill="#f0d000" transform="rotate(120 60 60)"/>
        <ellipse cx="60" cy="38" rx="7" ry="20" fill="#2bba49" transform="rotate(180 60 60)"/>
        <ellipse cx="60" cy="38" rx="7" ry="20" fill="#2b6dba" transform="rotate(240 60 60)"/>
        <ellipse cx="60" cy="38" rx="7" ry="20" fill="#9b2bba" transform="rotate(300 60 60)"/>
        <!-- white center circle -->
        <circle cx="60" cy="60" r="10" fill="#fff"/>
      </svg>

      <div class="clock-val" id="gameClkNBC">10:00</div>
      <div class="period-row">
        <span class="period-val" id="periodNBC">1ST</span>
        <span class="quarter-fouls" id="quarterFoulsNBC"></span>
      </div>
    </div>

    <!-- AWAY SCORE (bright team color bg) -->
    <div class="score-seg" id="awayScoreSeg">
      <div class="score-num" id="awayScoreNBC">0</div>
    </div>

    <!-- DIVIDER -->
    <div class="score-divider"></div>

    <!-- AWAY LOGO CIRCLE -->
    <div class="logo-seg" id="awayLogoSeg">
      <div class="logo-inner" id="awayLogoInner">
        <div class="logo-ph" id="awayLogoNBC">LOGO</div>
      </div>
      <div class="logo-badge away-badge" id="awayBadge"></div>
    </div>

    <!-- AWAY ABBR TAB (right edge) -->
    <div class="team-tab" id="awayTab">
      <span class="tab-abbr" id="awayAbbrNBC">AWAY</span>
    </div>

  </div><!-- /main-row -->

  <!-- ══ BOTTOM STRIP ══ -->
  <div class="bottom-strip">
    <span class="bonus-lbl" id="homeBonusLbl">BONUS</span>
    <div class="strip-divider"></div>
    <div class="ticker-center">
      <div class="ticker-ball"></div>
      <div class="ticker-text" id="tickerTextNBC">NBA BASKETBALL</div>
    </div>
    <div class="strip-divider"></div>
    <span class="bonus-lbl" id="awayBonusLbl">BONUS</span>
  </div>

</div><!-- /scorebug -->

<script>
/* ═══════════════════════════════════════════════════
   DATA LAYER — same Firebase/SSE/BroadcastChannel
   pattern as all other overlays in this project
   ═══════════════════════════════════════════════════ */
const SERVER_URL = (
  window.location.hostname.includes('vercel.app') ||
  window.location.hostname.includes('vercel.sh')
) ? 'https://basketball-scoreboard-o0c7.onrender.com' : '';

const useFirebase = window.location.hostname.includes('vercel.app') ||
                    window.location.hostname.includes('vercel.sh');
let db = null;
if (useFirebase && typeof firebase !== 'undefined' && isFirebaseConfigured) {
  try {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    db = firebase.database();
  } catch(e) { console.warn('Firebase init failed:', e); }
}

const urlParams   = new URLSearchParams(window.location.search);
const currentUser = urlParams.get('user') || localStorage.getItem('hc_session_user') || 'default';
const fbUser      = currentUser.replace(/[\.#$\[\]]/g, '_');

let _lastLocalMsgTime = 0;
const bc = new BroadcastChannel('hc_scoreboard_sync');
bc.onmessage = (e) => {
  const msg = e.data;
  if (!msg || msg.user !== fbUser) return;
  _lastLocalMsgTime = Date.now();
  if (msg.type === 'state') {
    stopLocalTick();
    S = { ...S, ...msg.data };
    render();
    syncLocalTick();
  } else if (msg.type === 'buzz') {
    if (msg.timestamp > _lastBuzzTime) {
      _lastBuzzTime = msg.timestamp;
      if (msg.kind === 'game') playGameBuzzer(); else playShotBuzzer();
    }
  }
};

/* ─── Default state ─── */
const DEF = {
  homeScore: 0, awayScore: 0,
  homeFouls: 0, awayFouls: 0,
  homeBonus: false, awayBonus: false,
  homeAbbr: 'HOME', homeColor: '#4a4a4a', homeLogo: null,
  awayAbbr: 'AWAY', awayColor: '#c8102e', awayLogo: null,
  quarter: 1, gameSeconds: 600, shotSeconds: 24,
  gameRunning: false, shotRunning: false,
  possession: null,
  rp1Title: '', rp1Value: '',
};
const PERIODS = ['1ST','2ND','3RD','4TH','OT','2OT'];
let S = { ...DEF };
let _lastBuzzTime = 0;
let lastHome = -1, lastAway = -1;

/* ─── Local clock tick ─── */
let localTick = null;
function startLocalTick() {
  if (localTick) return;
  localTick = setInterval(() => {
    if (S.gameRunning && S.gameSeconds > 0) { S.gameSeconds--; renderClocks(); }
    if (S.shotRunning && S.shotSeconds > 0) { S.shotSeconds--; renderClocks(); }
  }, 1000);
}
function stopLocalTick()  { clearInterval(localTick); localTick = null; }
function syncLocalTick()  { if (S.gameRunning || S.shotRunning) startLocalTick(); else stopLocalTick(); }

/* ─── Helpers ─── */
function el(id) { return document.getElementById(id); }
function txt(id, v) { const e = el(id); if (e) e.textContent = v; }

function darken(hex, pct) {
  // pct 0–1: 0=black, 1=original
  if (!hex || !hex.startsWith('#') || hex.length < 7) return '#1e1e1e';
  let r = parseInt(hex.slice(1,3),16),
      g = parseInt(hex.slice(3,5),16),
      b = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.round(r*pct)},${Math.round(g*pct)},${Math.round(b*pct)})`;
}
function isValidHex(h) {
  return h && typeof h === 'string' && h.startsWith('#') && h.length >= 7;
}

/* ─── Clock rendering ─── */
function renderClocks() {
  const gs  = S.gameSeconds;
  const m   = Math.floor(gs / 60);
  const sec = gs % 60;
  const txt_val = gs < 60 ? `${gs}.0` : `${m}:${sec.toString().padStart(2,'0')}`;
  const clk = el('gameClkNBC');
  if (clk) { clk.textContent = txt_val; clk.className = 'clock-val' + (gs <= 30 ? ' warn' : ''); }
}

/* ─── Logo setter (avoids outerHTML ID loss) ─── */
function setLogo(innerId, logoUrl) {
  const inner = el(innerId);
  if (!inner) return;
  if (logoUrl) {
    inner.innerHTML = `<img src="${logoUrl}" alt="" style="width:100%;height:100%;object-fit:contain;">`;
  } else {
    inner.innerHTML = `<div class="logo-ph">LOGO</div>`;
  }
}

/* ─── Full render ─── */
function render() {
  const qL = typeof S.quarter === 'number' ? (PERIODS[S.quarter-1] || `Q${S.quarter}`) : S.quarter;
  txt('periodNBC', qL);
  renderClocks();

  // Scores with bump animation
  const hEl = el('homeScoreNBC');
  const aEl = el('awayScoreNBC');
  if (hEl && parseInt(hEl.textContent) !== S.homeScore) {
    hEl.textContent = S.homeScore;
    if (lastHome >= 0) { hEl.classList.remove('bump'); void hEl.offsetWidth; hEl.classList.add('bump'); }
  }
  if (aEl && parseInt(aEl.textContent) !== S.awayScore) {
    aEl.textContent = S.awayScore;
    if (lastAway >= 0) { aEl.classList.remove('bump'); void aEl.offsetWidth; aEl.classList.add('bump'); }
  }
  lastHome = S.homeScore; lastAway = S.awayScore;

  // Abbreviations
  txt('homeAbbrNBC', (S.homeAbbr || 'HOME').toUpperCase().slice(0, 4));
  txt('awayAbbrNBC', (S.awayAbbr || 'AWAY').toUpperCase().slice(0, 4));

  // Foul badges
  const hf = S.homeFouls || 0;
  const af = S.awayFouls || 0;
  const hBadge = el('homeBadge');
  const aBadge = el('awayBadge');
  if (hBadge) { hBadge.textContent = hf; hBadge.style.display = hf > 0 ? 'block' : 'none'; }
  if (aBadge) { aBadge.textContent = af; aBadge.style.display = af > 0 ? 'block' : 'none'; }

  // Quarter fouls (rp1Value hook)
  const qfRaw = S.rp1Value || '';
  const qfNum = parseInt(qfRaw);
  txt('quarterFoulsNBC', (!isNaN(qfNum) && qfNum > 0) ? qfNum : '');

  // Bonus indicators
  const hBl = el('homeBonusLbl');
  const aBl = el('awayBonusLbl');
  if (hBl) hBl.className = 'bonus-lbl' + (S.homeBonus ? ' active' : '');
  if (aBl) aBl.className = 'bonus-lbl' + (S.awayBonus ? ' active' : '');

  // Ticker text
  const tickerEl = el('tickerTextNBC');
  if (tickerEl) {
    const t = (S.rp1Title && S.rp1Title.trim()) ? S.rp1Title.trim().toUpperCase() : 'NBA BASKETBALL';
    tickerEl.textContent = t;
  }

  // Team colors
  const hc = isValidHex(S.homeColor) ? S.homeColor : '#4a4a4a';
  const ac = isValidHex(S.awayColor) ? S.awayColor : '#c8102e';

  // HOME: abbr tab = team color, score seg = darkened team color, logo seg = very dark team color
  const hTab = el('homeTab');
  const hScoreSeg = el('homeScoreSeg');
  const hLogoSeg  = el('homeLogoSeg');
  if (hTab)      hTab.style.background      = hc;
  if (hScoreSeg) hScoreSeg.style.background = darken(hc, 0.55);
  if (hLogoSeg)  hLogoSeg.style.background  = darken(hc, 0.38);

  // AWAY: score seg = team color (full brightness), abbr tab = darker, logo seg = very dark
  const aTab = el('awayTab');
  const aScoreSeg = el('awayScoreSeg');
  const aLogoSeg  = el('awayLogoSeg');
  if (aScoreSeg) aScoreSeg.style.background = ac;
  if (aTab)      aTab.style.background      = darken(ac, 0.65);
  if (aLogoSeg)  aLogoSeg.style.background  = darken(ac, 0.38);

  // Logos
  setLogo('homeLogoInner', S.homeLogo);
  setLogo('awayLogoInner', S.awayLogo);
}

/* ─── Audio ─── */
window.addEventListener('load', () => {
  const a = new Audio('/buzzer.mp3'); a.volume = 0;
  a.play().then(() => { a.pause(); a.currentTime = 0; }).catch(() => {});
});
function playGameBuzzer() { const a = new Audio('/buzzer.mp3'); a.volume = 1.0; a.play().catch(() => {}); }
function playShotBuzzer() { const a = new Audio('/buzzer.mp3'); a.volume = 1.0; a.play().catch(() => {}); }

/* ─── SSE / Firebase connection ─── */
function connectSSE() {
  if (useFirebase && db) {
    db.ref(`states/${fbUser}`).on('value', snapshot => {
      if (Date.now() - _lastLocalMsgTime < 2000) return;
      const d = snapshot.val();
      if (!d) return;
      stopLocalTick(); S = { ...DEF, ...d }; render(); syncLocalTick();
    });
    db.ref(`buzz/${fbUser}`).on('value', snapshot => {
      if (Date.now() - _lastLocalMsgTime < 2000) return;
      const msg = snapshot.val();
      if (!msg || msg.timestamp <= _lastBuzzTime) return;
      _lastBuzzTime = msg.timestamp;
      if (msg.kind === 'game') playGameBuzzer(); else playShotBuzzer();
    });
    return;
  }
  const es = new EventSource(`${SERVER_URL}/events?user=${encodeURIComponent(currentUser)}`);
  es.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'buzz') {
        if (Date.now() - _lastLocalMsgTime < 2000) return;
        if (msg.kind === 'game') playGameBuzzer(); else playShotBuzzer();
      } else if (msg.type === 'state') {
        if (Date.now() - _lastLocalMsgTime < 2000) return;
        stopLocalTick(); S = { ...DEF, ...msg.data }; render(); syncLocalTick();
      }
    } catch(err) {}
  };
  es.onerror = () => { es.close(); setTimeout(connectSSE, 2000); };
}

/* ─── Bootstrap ─── */
if (useFirebase && db) {
  db.ref(`states/${fbUser}`).once('value').then(snapshot => {
    const data = snapshot.val();
    if (data) { S = { ...DEF, ...data }; render(); syncLocalTick(); }
  }).catch(() => {}).finally(() => { connectSSE(); });
} else {
  fetch(`${SERVER_URL}/state?user=${encodeURIComponent(currentUser)}`)
    .then(r => r.json())
    .then(d => { if (Object.keys(d).length) { S = { ...DEF, ...d }; render(); syncLocalTick(); } })
    .catch(() => {})
    .finally(() => { connectSSE(); });
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Live Scoreboard Overlay – Fullscreen</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@600;700&family=Barlow+Condensed:wght@600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background:transparent;
  font-family:'Barlow Condensed',sans-serif;
  overflow:hidden;
}

/* Full viewport — bar pinned near bottom */
#overlay {
  width:100vw;
  height:100vh;
  display:flex;
  align-items:flex-end;
  padding-bottom:3vh;
}

/* Bar uses vw units throughout so it scales with viewport */
.bar {
  width:100%; height:6.25vw;
  background:#0d1117;
  border-top:0.21vw solid #c8102e;
  border-bottom:0.21vw solid #c8102e;
  display:flex; align-items:center;
  overflow:visible; position:relative;
}
.bar-inner {
  display:flex; align-items:center;
  width:100%; height:100%;
  overflow:visible; position:relative;
}

.team-seg { display:flex; align-items:center; padding:0 0.42vw; flex-shrink:0; }
.team-seg.home { flex-direction:row; padding-left:0.73vw; }
.team-seg.away { flex-direction:row-reverse; padding-right:0.73vw; }

.record { font-size:0.68vw; font-weight:700; color:#8a95a8; letter-spacing:0.03vw; padding:0 0.52vw; white-space:nowrap; width:3.13vw; text-align:center; flex-shrink:0; }

.logo-wrap { width:7.8vw; height:7.8vw; flex-shrink:0; margin:0 0.31vw; position:relative; z-index:9999; }
.logo-circle {
  width:7.8vw; height:7.8vw; border-radius:50%;
  background:#111; border:0.21vw solid rgba(255,255,255,0.15);
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; box-shadow:0 0.21vw 1.25vw rgba(0,0,0,0.8);
  position:relative; z-index:9999;
}
.logo-circle img { width:7vw; height:7vw; object-fit:contain; }
.logo-ph { font-size:0.47vw; font-weight:700; color:rgba(255,255,255,0.25); text-transform:uppercase; text-align:center; line-height:1.3; }

.team-text { display:flex; flex-direction:column; justify-content:center; padding:0 0.21vw; flex-shrink:0; }
.team-seg.away .team-text { align-items:flex-end; }
.team-abbrev { font-family:'Teko',sans-serif; font-size:1.67vw; font-weight:700; color:#fff; letter-spacing:0.05vw; line-height:1; text-transform:uppercase; white-space:nowrap; }

.score-block {
  display:flex; align-items:center; justify-content:center;
  background:#161b26; height:100%; width:5.73vw; flex-shrink:0;
  border-left:1px solid rgba(255,255,255,0.07);
  border-right:1px solid rgba(255,255,255,0.07);
}
.score-num { font-family:'Teko',sans-serif; font-size:4.17vw; font-weight:700; color:#fff; letter-spacing:0.05vw; line-height:1; width:100%; text-align:center; font-variant-numeric:tabular-nums; }

.center-block {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:0 1.15vw; gap:0.1vw;
  border-left:1px solid rgba(255,255,255,0.07);
  border-right:1px solid rgba(255,255,255,0.07);
  background:#161b26; width:10.42vw; flex-shrink:0; height:100%;
}
.period-badge { font-size:0.68vw; font-weight:800; letter-spacing:0.16vw; color:rgba(255,255,255,0.45); text-transform:uppercase; white-space:nowrap; }
.game-clock {
  font-family:'Teko',sans-serif; font-size:2.92vw; font-weight:700; color:#fff;
  letter-spacing:0.16vw; line-height:1; transition:color 0.3s;
  font-variant-numeric:tabular-nums; white-space:nowrap; width:8.33vw; text-align:center;
}
.game-clock.warn { color:#ff5f5f; }
.shot-row { display:flex; align-items:center; gap:0.26vw; }
.shot-label { font-size:0.57vw; font-weight:800; color:#8a95a8; letter-spacing:0.1vw; text-transform:uppercase; }
.shot-num { font-family:'Teko',sans-serif; font-size:1.35vw; font-weight:700; color:#f5c842; letter-spacing:0.05vw; width:1.88vw; text-align:center; line-height:1; font-variant-numeric:tabular-nums; }
.shot-num.urgent { color:#e84040; animation:scPulse 0.45s ease infinite alternate; }
@keyframes scPulse { to { opacity:0.4; } }

.right-panel { flex:1; display:flex; align-items:stretch; border-left:1px solid rgba(255,255,255,0.07); height:100%; }
.live-seg { display:flex; align-items:center; gap:0.42vw; padding:0 0.94vw; border-right:1px solid rgba(255,255,255,0.07); }
.live-dot { width:0.36vw; height:0.36vw; border-radius:50%; background:#e84040; box-shadow:0 0 0.42vw #e84040; animation:livePulse 1.2s ease infinite; }
@keyframes livePulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.6)} }
.live-text { font-size:0.52vw; font-weight:800; letter-spacing:0.16vw; color:rgba(255,255,255,0.5); text-transform:uppercase; }

.rp-seg { display:flex; flex-direction:column; justify-content:center; padding:0 0.94vw; border-right:1px solid rgba(255,255,255,0.07); flex:1; }
.rp-title { font-size:0.52vw; font-weight:800; letter-spacing:0.13vw; color:rgba(255,255,255,0.3); text-transform:uppercase; margin-bottom:0.05vw; }
.rp-val { font-family:'Teko',sans-serif; font-size:1.46vw; font-weight:700; color:#fff; letter-spacing:0.05vw; line-height:1; }

/* Possession arrows */
.poss-arrow-ov {
  display:flex; align-items:center; justify-content:center;
  width:1.88vw; flex-shrink:0; opacity:0;
  transition:opacity 0.3s, filter 0.3s;
}
.poss-arrow-ov svg { width:1.46vw; height:1.04vw; }
.poss-arrow-ov.on {
  opacity:1;
  filter:drop-shadow(0 0 0.26vw #ff8800) drop-shadow(0 0 0.63vw #ff6600) drop-shadow(0 0 1.15vw #ff4400);
}
.poss-arrow-ov.home.on { animation:arrowBounceLeft  0.8s ease-in-out infinite alternate; }
.poss-arrow-ov.away.on { animation:arrowBounceRight 0.8s ease-in-out infinite alternate; }
@keyframes arrowBounceLeft  { from{transform:translateX(0)} to{transform:translateX(-0.21vw)} }
@keyframes arrowBounceRight { from{transform:translateX(0)} to{transform:translateX( 0.21vw)} }

@keyframes scoreBump {
  0%  { transform:scale(1); color:#fff; }
  40% { transform:scale(1.2); color:#f5c842; }
  100%{ transform:scale(1); color:#fff; }
}
.bump { animation:scoreBump 0.38s ease; }
</style>
</head>
<body>

<div id="overlay">
  <div class="bar" id="mainBar">
    <div class="bar-inner">

      <!-- HOME -->
      <div class="team-seg home">
        <div class="record" id="homeRecordOv">0-0</div>
        <div class="logo-wrap">
          <div class="logo-circle" id="homeLogoOv"><div class="logo-ph">LOGO</div></div>
        </div>
        <div class="team-text">
          <div class="team-abbrev" id="homeAbbrOv">HOME</div>
        </div>
      </div>

      <!-- HOME POSSESSION ARROW -->
      <div class="poss-arrow-ov home" id="possArrowHome">
        <svg viewBox="0 0 60 42">
          <defs><radialGradient id="arrowGlowOvHome" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#ffcc00"/><stop offset="100%" stop-color="#ff6600"/></radialGradient></defs>
          <polygon points="4,21 56,3 56,39" fill="url(#arrowGlowOvHome)"/>
        </svg>
      </div>

      <div class="score-block">
        <div class="score-num" id="homeScoreOv">0</div>
      </div>

      <!-- CENTER -->
      <div class="center-block">
        <div class="period-badge" id="periodOv">1ST</div>
        <div class="game-clock" id="gameClkOv">10:00</div>
        <div class="shot-row">
          <div class="shot-label">SHOT</div>
          <div class="shot-num" id="shotClkOv">24</div>
        </div>
      </div>

      <div class="score-block">
        <div class="score-num" id="awayScoreOv">0</div>
      </div>

      <!-- AWAY POSSESSION ARROW -->
      <div class="poss-arrow-ov away" id="possArrowAway">
        <svg viewBox="0 0 60 42">
          <defs><radialGradient id="arrowGlowOvAway" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#ffffff"/><stop offset="40%" stop-color="#ffcc00"/><stop offset="100%" stop-color="#ff6600"/></radialGradient></defs>
          <polygon points="56,21 4,3 4,39" fill="url(#arrowGlowOvAway)"/>
        </svg>
      </div>

      <!-- AWAY -->
      <div class="team-seg away">
        <div class="team-text" style="align-items:flex-end;">
          <div class="team-abbrev" id="awayAbbrOv">AWAY</div>
        </div>
        <div class="logo-wrap">
          <div class="logo-circle" id="awayLogoOv"><div class="logo-ph">LOGO</div></div>
        </div>
        <div class="record" id="awayRecordOv">0-0</div>
      </div>

      <!-- RIGHT PANEL -->
      <div class="right-panel">
        <div class="live-seg">
          <div class="live-dot"></div>
          <div class="live-text">LIVE</div>
        </div>
        <div class="rp-seg">
          <div class="rp-title" id="rp1TOv">BROADCAST</div>
          <div class="rp-val" id="rp1VOv">—</div>
        </div>
        <div class="rp-seg">
          <div class="rp-title" id="rp2TOv">VENUE</div>
          <div class="rp-val" id="rp2VOv">—</div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const DEF = {
  homeScore:0, awayScore:0,
  homeAbbr:'HOME', homeRecord:'0-0', homeColor:'#f5c842', homeLogo:null,
  awayAbbr:'AWAY', awayRecord:'0-0', awayColor:'#c8102e', awayLogo:null,
  quarter:1, gameSeconds:600, shotSeconds:24,
  possession:null,
  rp1Title:'BROADCAST', rp1Value:'—',
  rp2Title:'VENUE', rp2Value:'—',
  barColor:'#0d1117',
};
const PERIODS = ['1ST','2ND','3RD','4TH','OT','2OT'];
let S = {...DEF};

function s(id,val){ const e=document.getElementById(id); if(e) e.textContent=val; }

function render(){
  s('homeAbbrOv',  S.homeAbbr.toUpperCase());
  s('homeRecordOv',S.homeRecord);
  s('homeScoreOv', S.homeScore);
  s('awayAbbrOv',  S.awayAbbr.toUpperCase());
  s('awayRecordOv',S.awayRecord);
  s('awayScoreOv', S.awayScore);

  const qL = typeof S.quarter==='number' ? (PERIODS[S.quarter-1]||`Q${S.quarter}`) : S.quarter;
  s('periodOv', qL);

  const m=Math.floor(S.gameSeconds/60), sec=S.gameSeconds%60;
  const clkEl=document.getElementById('gameClkOv');
  if(clkEl){ clkEl.textContent=`${m}:${sec.toString().padStart(2,'0')}`; clkEl.className='game-clock'+(S.gameSeconds<=30?' warn':''); }

  const shotEl=document.getElementById('shotClkOv');
  if(shotEl){ shotEl.textContent=S.shotSeconds; shotEl.className='shot-num'+(S.shotSeconds<=5?' urgent':''); }

  s('rp1TOv',S.rp1Title); s('rp1VOv',S.rp1Value);
  s('rp2TOv',S.rp2Title); s('rp2VOv',S.rp2Value);

  if(S.homeLogo){ const e=document.getElementById('homeLogoOv'); if(e) e.innerHTML=`<img src="${S.homeLogo}" alt="">`; }
  if(S.awayLogo){ const e=document.getElementById('awayLogoOv'); if(e) e.innerHTML=`<img src="${S.awayLogo}" alt="">`; }

  const hCircle=document.getElementById('homeLogoOv');
  const aCircle=document.getElementById('awayLogoOv');
  if(hCircle){ hCircle.style.border=`0.26vw solid ${S.homeColor||'#f5c842'}`; hCircle.style.boxShadow=`0 0 0.63vw ${S.homeColor||'#f5c842'}, 0 0.21vw 1.25vw rgba(0,0,0,0.8)`; }
  if(aCircle){ aCircle.style.border=`0.26vw solid ${S.awayColor||'#c8102e'}`; aCircle.style.boxShadow=`0 0 0.63vw ${S.awayColor||'#c8102e'}, 0 0.21vw 1.25vw rgba(0,0,0,0.8)`; }

  const homeArrow=document.getElementById('possArrowHome');
  const awayArrow=document.getElementById('possArrowAway');
  if(homeArrow) homeArrow.classList.toggle('on', S.possession==='home');
  if(awayArrow) awayArrow.classList.toggle('on', S.possession==='away');
}

window.addEventListener('load', () => {
  const audio=new Audio('/buzzer.mp3'); audio.volume=0;
  audio.play().then(()=>{ audio.pause(); audio.currentTime=0; }).catch(()=>{});
});

function playGameBuzzer(){ const a=new Audio('/buzzer.mp3'); a.volume=1.0; a.play().catch(()=>{}); }
function playShotBuzzer(){ const a=new Audio('/buzzer.mp3'); a.volume=1.0; a.play().catch(()=>{}); }

function connectSSE(){
  const es=new EventSource('/events');
  es.onmessage=(e)=>{
    try {
      const msg=JSON.parse(e.data);
      if(msg.type==='buzz'){ if(msg.kind==='game') playGameBuzzer(); else playShotBuzzer(); }
      else if(msg.type==='state'){ S={...DEF,...msg.data}; render(); }
    } catch(err){}
  };
  es.onerror=()=>{ es.close(); setTimeout(connectSSE,2000); };
}

fetch('/state').then(r=>r.json()).then(data=>{
  if(Object.keys(data).length){ S={...DEF,...data}; render(); }
}).catch(()=>{}).finally(()=>{ connectSSE(); });
</script>
</body>
</html>
